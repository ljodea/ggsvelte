# Build and deploy the SvelteKit docs site to GitHub Pages.
# All third-party actions are pinned by full commit SHA (zizmor-enforced).
name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: build static docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build packages
        run: bun run build
      - name: Build docs for the repository subpath
        env:
          BASE_PATH: /ggsvelte
        run: bun run build:docs
      - name: Include benchmark history
        run: |
          git fetch --depth=1 origin gh-pages
          git archive --format=tar origin/gh-pages bench | tar -xf - -C apps/docs/build
      - name: Verify deployable artifact
        run: |
          test -f apps/docs/build/index.html
          test -f apps/docs/build/bench/index.html
          if grep -R -E 'href="/(guide|examples|schema|llms)' apps/docs/build; then
            echo "Docs build contains links that escape the /ggsvelte base path" >&2
            exit 1
          fi
      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: apps/docs/build

  deploy:
    name: deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
