# Build and deploy the SvelteKit docs site to GitHub Pages.
# All third-party actions are pinned by full commit SHA (zizmor-enforced).
# Path-routed via scripts/ci-routing.ts so package-unrelated main pushes
# (e.g. markdown-only, workflow-only) do not rebuild/redeploy Pages.
name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

# Concurrency is intentionally NOT workflow-level. A path-routed `pages=false`
# run that only executes detect-changes must not enter the deploy group and
# displace a pending real deploy (GitHub keeps only one pending run per group).
# Serialize production deploys on the deploy job alone (see below).

jobs:
  detect-changes:
    name: detect-changes (path routing)
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
    outputs:
      pages: ${{ steps.route.outputs.pages }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - id: route
        name: classify changed paths → pages flag
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          # Manual dispatch always rebuilds/deploys.
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            bun scripts/ci-routing.ts emit-github-output --force-all
            exit 0
          fi
          zero="0000000000000000000000000000000000000000"
          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "${zero}" ]; then
            bun scripts/ci-routing.ts emit-github-output --force-all
            exit 0
          fi
          git fetch --no-tags --depth=1 origin "${BASE_SHA}" 2>/dev/null || true
          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            bun scripts/ci-routing.ts emit-github-output --force-all
            exit 0
          fi
          # --name-status keeps rename/copy source paths for classification.
          mapfile -t files < <(git diff --name-status "${BASE_SHA}...${HEAD_SHA}" || true)
          if [ "${#files[@]}" -eq 0 ]; then
            printf '' | bun scripts/ci-routing.ts emit-github-output --stdin
          else
            printf '%s\n' "${files[@]}" | bun scripts/ci-routing.ts emit-github-output --stdin
          fi

  build:
    name: build static docs
    needs: detect-changes
    if: needs.detect-changes.outputs.pages == 'true'
    runs-on: [self-hosted, ggsvelte, ggsvelte-heavy]
    permissions:
      contents: read
    env:
      # Keep serving the full site until the apex smoke gate passes. The
      # cutover runbook then sets this repository variable to legacy-migration.
      DOCS_BUILD_MODE: ${{ vars.DOCS_LEGACY_MODE || 'legacy-full' }}
      BASE_PATH: /ggsvelte
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          BUN_INSTALL_CACHE_DIR: ${{ runner.temp }}/bun-install-cache
      - name: Build packages
        run: bun run build
      - name: Build docs for the repository subpath
        run: bun run build:docs
      - name: Include benchmark history
        run: |
          git fetch --depth=1 origin gh-pages
          benchmark_commit=$(git rev-parse origin/gh-pages)
          printf 'BENCHMARK_COMMIT=%s\n' "${benchmark_commit}" >> "${GITHUB_ENV}"
          git archive --format=tar origin/gh-pages bench | tar -xf - -C apps/docs/build
      - name: Replace known routes with fixed-origin migration pages
        if: env.DOCS_BUILD_MODE == 'legacy-migration'
        run: bun scripts/legacy-migration.ts
      - name: Verify packed links and required R0 journeys
        run: bun run check:pages-links
      - name: Bind artifact to source, frozen routes, and benchmark bytes
        run: bun scripts/legacy-artifact.ts
      - name: Verify deployable artifact
        run: |
          test -f apps/docs/build/index.html
          test -f apps/docs/build/bench/index.html
          test -f apps/docs/build/404.html
          test -f apps/docs/build/artifact.json
          if grep -R -E 'href="/(guide|examples|schema|llms)' apps/docs/build; then
            echo "Docs build contains links that escape the /ggsvelte base path" >&2
            exit 1
          fi
      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: apps/docs/build

  deploy:
    name: deploy GitHub Pages
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.pages == 'true' && needs.build.result == 'success'
    # Serialize production deploys only — skip-only runs never reach this job,
    # so they cannot cancel or displace a pending deploy of a docs/package push.
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    # GitHub-hosted: pages write + OIDC; keep privileged deploys off self-hosted.
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
