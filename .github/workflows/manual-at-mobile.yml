name: Manual AT Mobile Evidence

on:
  workflow_dispatch:
    inputs:
      fixture_url:
        description: Optional URL reachable from the Android emulator
        required: false
        default: http://10.0.2.2:4173/examples/interactions/inspection#try-it-heading
        type: string

permissions: {}

concurrency:
  group: manual-at-mobile-${{ github.ref }}
  cancel-in-progress: false

jobs:
  talkback-chrome:
    name: real TalkBack + Chrome touch evidence
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      MANUAL_AT_URL: ${{ inputs.fixture_url }}
      MANUAL_AT_OUTPUT_DIR: ${{ github.workspace }}/artifacts/manual-at-mobile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5
        with:
          gradle-version: "8.13"
      - name: install and build the current docs fixture
        run: |
          set -euo pipefail
          bun install --frozen-lockfile
          bun run build
          bun run build:docs
          bun scripts/serve-docs.ts > "${RUNNER_TEMP}/ggsvelte-docs.log" 2>&1 &
          echo "$!" > "${RUNNER_TEMP}/ggsvelte-docs.pid"
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:4173/examples/interactions/inspection >/dev/null && exit 0
            sleep 1
          done
          echo "::error::Built docs fixture did not start"
          exit 1
      - name: build pinned Google TalkBack from source
        run: bash scripts/manual-at/mobile/build-talkback.sh "${MANUAL_AT_OUTPUT_DIR}"
      - name: enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: boot Android and collect real TalkBack speech
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.34.0
        with:
          api-level: 35
          target: google_apis_playstore
          arch: x86_64
          profile: pixel_7
          cores: 2
          ram-size: 4096M
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: bash scripts/manual-at/mobile/run-talkback-chrome.sh
      - name: upload speech, gesture, environment, and screenshot evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: manual-at-talkback-chrome-${{ github.run_id }}
          path: artifacts/manual-at-mobile/
          if-no-files-found: error
          retention-days: 30
