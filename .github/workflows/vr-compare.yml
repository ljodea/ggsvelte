# Visual-regression COMPARE — the UNPRIVILEGED half of the two-workflow trust
# separation (plan, round-2 security fix).
#
# Invariants (do not weaken):
#   - triggers are plain `pull_request` and `issue_comment`: NO secrets beyond
#     the read-only default GITHUB_TOKEN, NO write permissions, and PR-authored
#     code (including build configs/plugins) only ever executes HERE, in this
#     unprivileged context.
#   - its only output channels to the privileged half are workflow artifacts:
#     `vr-baselines` (pull_request flavor: candidate shots) and
#     `vr-baselines-approved` (/approve-visuals flavor: regenerated baselines).
#     vr-approve.yml verifies those WITHOUT executing anything from them, and
#     INDEPENDENTLY re-verifies the approval via the API — metadata written
#     here is a hint for the privileged half, never a credential.
#
# Approval flavor (M3): after the source PR merges to the default branch, a
# maintainer comments `/approve-visuals` on it. The approve-gate checks the
# command, author association, merge target, and post-merge timestamp, then
# resolves the immutable merged commit. approve-regenerate checks out THAT
# commit from the base repo and REGENERATES baselines inside the pinned container.
# Still unprivileged: merged code runs only in read-only contexts, producing
# inert PNGs.
#
# Baseline policy (decision 0009): committed baselines in
# tests/visual/__screenshots__/ come ONLY from this pinned container. While
# the directory is empty (pre-bootstrap), the pull_request run GENERATES
# candidate shots, uploads them, and posts a "no baselines yet" summary
# instead of failing — the first CI run on GitHub bootstraps the baseline set
# via the vr-approve flow.
name: VR Compare

on:
  pull_request:
  # Approval flavor. issue_comment fires for every comment in the repo; the
  # approve-* jobs gate hard on PR-ness, the exact `/approve-visuals` command,
  # and the commenter's author_association (computed by GitHub, not
  # attacker-supplied).
  issue_comment:
    types: [created]

permissions: {}

concurrency:
  # Separate groups per flavor so an approval run never cancels (or is
  # cancelled by) the plain compare run for the same PR.
  group: vr-compare-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: detect-changes (path routing)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      vr: ${{ steps.route.outputs.vr }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - id: route
        name: classify changed paths → vr flag
        env:
          # Same resolveRouteInputs + emit path as ci.yml (issue #415). PR-only:
          # no main base widening; run-compat only affects consumer/packages_dist.
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          REPO: ${{ github.repository }}
        # Env-only contract: force-all / unresolvable base / empty / name-status
        # live in scripts/ci-routing/detect-changes.ts (shared with ci.yml).
        run: bun scripts/ci-routing.ts detect-changes

  compare:
    name: build docs, screenshot, upload candidate baselines
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.vr == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      # Pinned baseline platform — keep in sync with ci.yml's component job
      # and the repo-pinned playwright/@playwright/test 1.61.1.
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    defaults:
      run:
        # The container's /bin/sh is dash, which rejects `set -o pipefail`.
        shell: bash
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/ci-install-unzip
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ runner.temp }}/bun-install-cache
          key: bun-container-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-container-${{ runner.os }}-
      - run: bun install --frozen-lockfile
        env:
          BUN_INSTALL_CACHE_DIR: ${{ runner.temp }}/bun-install-cache

      - name: manifest is current (the VR matrix is generated from it)
        run: bun run manifest:check

      - name: build packages (spec/core dist + svelte-package)
        run: bun run build

      - name: build static docs site (the VR screenshot target)
        run: bun run build:docs

      - name: run smoke VR screenshots against the built docs
        run: |
          set -euo pipefail
          # Smoke-only (tests/visual/vr.spec.ts). Non-pixel docs journeys live
          # in ci.yml component-journeys under docs_journeys routing.
          if ls tests/visual/__screenshots__/*.png >/dev/null 2>&1; then
            echo "committed smoke baselines present — comparing"
            # workers=1: point/canvas-scatter (10k marks) monopolizes the main thread
            # during hydrate; parallel workers starve it past the test budget on CI.
            bun run test:visual -- vr.spec.ts --workers=1
          else
            echo "::notice::no committed baselines yet — generating smoke candidates (bootstrap via CI; see docs/decisions/0009)"
            {
              echo "## VR bootstrap mode"
              echo ""
              echo "\`tests/visual/__screenshots__/\` is empty: no baselines are committed yet."
              echo "This run GENERATED candidate smoke baselines inside the pinned container and"
              echo "uploaded them as the \`vr-baselines\` artifact. Land them via the vr-approve"
              echo "flow or same-PR smoke update (container-only baseline policy — docs/decisions/0009)."
            } >> "$GITHUB_STEP_SUMMARY"
            bun run test:visual -- vr.spec.ts --workers=1 --update-snapshots
          fi

      - name: upload playwright report (on comparison failure)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vr-playwright-report
          path: |
            tests/visual/playwright-report/
            tests/visual/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: assemble candidate-baseline artifact (PNGs + metadata)
        run: |
          set -euo pipefail
          mkdir -p vr-artifact/__screenshots__
          if ls tests/visual/__screenshots__/*.png >/dev/null 2>&1; then
            cp tests/visual/__screenshots__/*.png vr-artifact/__screenshots__/
          fi
          # The metadata contract below is load-bearing for vr-approve.yml:
          printf '%s\n' "pr=${PR_NUMBER}" "head_sha=${HEAD_SHA}" > vr-artifact/metadata.txt
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: upload candidate baselines
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vr-baselines
          path: vr-artifact/
          if-no-files-found: error
          retention-days: 7

  approve-gate:
    name: /approve-visuals — verify merge, resolve rendered commit (read-only)
    # Only comments ON a PR, only from commenters whose association implies
    # repo trust (OWNER/MEMBER/COLLABORATOR). This job runs NO checked-out
    # code — just the command parse and a read-only API lookup.
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    # GitHub-hosted: this 5s job needs the `gh` CLI (preinstalled on
    # ubuntu-latest, absent on the self-hosted ggsvelte runners) and runs no
    # checked-out code. vr-approve.yml already runs on ubuntu-latest.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # resolve the merged PR via `gh api` (read-only)
    outputs:
      match: ${{ steps.cmd.outputs.match }}
      render_sha: ${{ steps.pr.outputs.render_sha }}
      render_repo: ${{ steps.pr.outputs.render_repo }}
    steps:
      - name: trimmed comment body must be exactly `/approve-visuals`
        id: cmd
        env:
          # env-indirection: the body is attacker-controlled text and must
          # never be interpolated into the script itself.
          BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail
          trimmed="${BODY#"${BODY%%[![:space:]]*}"}"
          trimmed="${trimmed%"${trimmed##*[![:space:]]}"}"
          if [ "${trimmed}" = "/approve-visuals" ]; then
            echo "match=true" >> "$GITHUB_OUTPUT"
          else
            echo "comment is not an /approve-visuals command — nothing to do"
            echo "match=false" >> "$GITHUB_OUTPUT"
          fi

      - name: verify default-branch merge and resolve rendered commit (read-only API)
        id: pr
        if: steps.cmd.outputs.match == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMENT_CREATED_AT: ${{ github.event.comment.created_at }}
        run: |
          set -euo pipefail
          pr_json="$(gh api "repos/${REPO}/pulls/${PR_NUMBER}")"
          merged_at="$(printf '%s' "${pr_json}" | jq -r '.merged_at // empty')"
          if [ -z "${merged_at}" ]; then
            echo "::error::source PR #${PR_NUMBER} is not merged — merge it to the default branch, then comment /approve-visuals"
            exit 1
          fi

          base_repo="$(printf '%s' "${pr_json}" | jq -r '.base.repo.full_name // empty')"
          base_ref="$(printf '%s' "${pr_json}" | jq -r '.base.ref // empty')"
          default_branch="$(gh api "repos/${REPO}" --jq .default_branch)"
          if [ "${base_repo}" != "${REPO}" ] || [ "${base_ref}" != "${default_branch}" ]; then
            echo "::error::source PR #${PR_NUMBER} targeted ${base_repo}:${base_ref}, not ${REPO}:${default_branch}"
            exit 1
          fi

          comment_epoch="$(date -u -d "${COMMENT_CREATED_AT}" +%s)"
          merged_epoch="$(date -u -d "${merged_at}" +%s)"
          if [ "${comment_epoch}" -le "${merged_epoch}" ]; then
            echo "::error::approval comment predates merge — comment /approve-visuals again after PR #${PR_NUMBER} merges"
            exit 1
          fi

          render_sha="$(printf '%s' "${pr_json}" | jq -r '.merge_commit_sha // empty')"
          render_repo="${REPO}"
          if ! printf '%s' "${render_sha}" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error::resolved merged commit is not a 40-hex commit id: ${render_sha}"
            exit 1
          fi
          default_sha="$(gh api --method GET "repos/${REPO}/commits" -f sha="${default_branch}" -f per_page=1 --jq '.[0].sha')"
          compare_status="$(gh api "repos/${REPO}/compare/${render_sha}...${default_sha}" --jq .status)"
          case "${compare_status}" in
            identical|ahead) ;;
            *) echo "::error::merged render ${render_sha} is not reachable from ${default_branch} (${compare_status})"; exit 1 ;;
          esac
          echo "resolved PR #${PR_NUMBER} merged render: ${render_repo}@${render_sha}"
          echo "render_sha=${render_sha}" >> "$GITHUB_OUTPUT"
          echo "render_repo=${render_repo}" >> "$GITHUB_OUTPUT"

  approve-regenerate:
    name: /approve-visuals — regenerate baselines at merged commit (pinned container)
    needs: approve-gate
    if: needs.approve-gate.outputs.match == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout only; this job can write nothing
    container:
      # SAME pinned image as the compare job — container-only baseline
      # policy (decision 0009).
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    defaults:
      run:
        # The container's /bin/sh is dash, which rejects `set -o pipefail`.
        shell: bash
    steps:
      # The merged render commit (build configs, plugins, examples) executes
      # from here on. That is acceptable ONLY because this job is
      # read-only: no write permissions, no secrets beyond the read-only
      # default GITHUB_TOKEN, and its sole output is the inert artifact
      # below, which vr-approve.yml re-verifies against the API.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ needs.approve-gate.outputs.render_repo }}
          # Exact merged SHA, never a movable branch ref — what gets
          # screenshotted is exactly what vr-approve re-verifies against.
          ref: ${{ needs.approve-gate.outputs.render_sha }}
          persist-credentials: false
      # Inlined (not `uses: ./.github/actions/ci-install-unzip`) on purpose: the
      # checkout above replaced the workspace with the approved PR's merged
      # render SHA, and a workspace-local `uses: ./...` resolves against THAT
      # tree. Render SHAs merged before this helper existed would not contain
      # the action, so the step would fail before setup-bun. This self-contained
      # script works regardless of the checked-out tree. Mirrors
      # .github/actions/ci-install-unzip (fast Azure-mirror, main-only).
      - name: install unzip via Azure Ubuntu mirror (main only)
        run: |
          set -euo pipefail
          if command -v unzip >/dev/null 2>&1; then
            echo "unzip already present ($(command -v unzip)); skipping apt."
            exit 0
          fi
          keyring=/usr/share/keyrings/ubuntu-archive-keyring.gpg
          {
            echo "deb [signed-by=${keyring}] http://azure.archive.ubuntu.com/ubuntu noble main"
            echo "deb [signed-by=${keyring}] http://azure.archive.ubuntu.com/ubuntu noble-updates main"
          } > /etc/apt/sources.list.d/ci-unzip.list
          apt-get \
            -o Dir::Etc::sourceparts="-" \
            -o Dir::Etc::sourcelist="sources.list.d/ci-unzip.list" \
            -o APT::Get::List-Cleanup="0" \
            update
          apt-get install -y --no-install-recommends unzip
          echo "unzip installed: $(command -v unzip)"
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ runner.temp }}/bun-install-cache
          key: bun-container-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-container-${{ runner.os }}-
      - run: bun install --frozen-lockfile
        env:
          BUN_INSTALL_CACHE_DIR: ${{ runner.temp }}/bun-install-cache

      - name: manifest is current (the VR matrix is generated from it)
        run: bun run manifest:check

      - name: build packages (spec/core dist + svelte-package)
        run: bun run build

      - name: build static docs site (the VR screenshot target)
        run: bun run build:docs

      - name: REGENERATE baselines at the approved merged commit
        # Smoke-only screenshots (tests/visual/vr.spec.ts) — same scope as compare.
        # Checkout is the *merged render SHA* of the approved PR (security: pin
        # what gets screenshotted). That tree may predate moving the non-pixel
        # scroll assert out of vr.spec.ts, so --grep-invert drops that title on
        # legacy SHAs. Current main already keeps vr.spec screenshot-only (#421).
        # workers=1 matches the compare job — canvas-scatter hydrate is main-thread heavy.
        run: >-
          bun run test:visual -- vr.spec.ts --workers=1 --update-snapshots
          --grep-invert 'preserves real page scrolling'

      - name: assemble approved-baseline artifact (PNGs + metadata)
        env:
          PR_NUMBER: ${{ github.event.issue.number }}
          RENDER_SHA: ${{ needs.approve-gate.outputs.render_sha }}
          COMMENT_ID: ${{ github.event.comment.id }}
          COMMENT_CREATED_AT: ${{ github.event.comment.created_at }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        run: |
          set -euo pipefail
          mkdir -p vr-artifact/__screenshots__
          cp tests/visual/__screenshots__/*.png vr-artifact/__screenshots__/
          # Metadata contract is load-bearing for vr-approve.yml. Every claim
          # below is RE-VERIFIED there against the GitHub API (comment body,
          # PR linkage, author permission, timestamps) before anything is
          # written — this file merely tells the privileged half where to look.
          printf '%s\n' \
            "pr=${PR_NUMBER}" \
            "render_sha=${RENDER_SHA}" \
            "comment_id=${COMMENT_ID}" \
            "comment_created_at=${COMMENT_CREATED_AT}" \
            "comment_author=${COMMENT_AUTHOR}" > vr-artifact/metadata.txt

      - name: upload approved baselines
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vr-baselines-approved
          path: vr-artifact/
          if-no-files-found: error
          retention-days: 7
