# Expanded consumer boundaries. Pull requests run the bounded required matrix
# in ci.yml; this scheduled workflow adds Node Current, macOS, and additional
# Windows/package-manager pairs without imposing a full Cartesian product.
name: Compatibility nightly

on:
  schedule:
    - cron: "23 5 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: compatibility-nightly
  cancel-in-progress: false

jobs:
  matrix:
    name: compatibility matrix (required + nightly)
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - id: matrix
        shell: bash
        run: echo "matrix=$(bun scripts/support-matrix.ts nightly)" >> "$GITHUB_OUTPUT"

  packed-consumer:
    name: packed consumer (${{ matrix.os }}, Node ${{ matrix.node }}, ${{ matrix.packageManager }}, Svelte ${{ matrix.svelte }})
    needs: matrix
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJSON(needs.matrix.outputs.matrix) }}
    # Linux rows use self-hosted (non-heavy — leave heavy for Playwright); Windows/macOS hosted.
    runs-on: ${{ startsWith(matrix.os, 'ubuntu') && fromJSON('["self-hosted","ggsvelte"]') || matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
        env:
          BUN_INSTALL_CACHE_DIR: ${{ runner.temp }}/bun-install-cache
      - run: bun run build
      - run: bun run check:svelte
      - env:
          BUN_INSTALL_CACHE_DIR: ${{ runner.temp }}/bun-install-cache
          PACKAGE_MANAGER: ${{ matrix.packageManager }}
          PACKAGE_MANAGER_VERSION: ${{ matrix.packageManagerVersion }}
          SVELTE_VERSION: ${{ matrix.svelte }}
        run: bun scripts/consumer-compat.ts
