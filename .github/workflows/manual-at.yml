name: Manual assistive-technology evidence

on:
  workflow_dispatch:
    inputs:
      target:
        description: Fixture target to exercise
        required: true
        default: local
        type: choice
        options:
          - local
          - live
      release:
        description: Release identifier recorded with the evidence
        required: true
        default: 0.1.0
        type: string
      profile:
        description: Display profile exercised by the real browser and operating system
        required: true
        default: baseline
        type: choice
        options:
          - baseline
          - forced-colors
          - browser-zoom-200

permissions: {}

concurrency:
  group: manual-at-${{ github.ref }}-${{ inputs.target }}-${{ inputs.profile }}
  cancel-in-progress: false

jobs:
  nvda-windows:
    name: NVDA 2026.1.1 / ${{ matrix.browser }} / Windows 2022
    runs-on: windows-2022
    timeout-minutes: 35
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]
    env:
      NVDA_VERSION: 2026.1.1
      NVDA_SHA256: 6e0289eb5a3aa076eb97ea99c5d5465cb48b5ecc6a3257dc3d811f881a1747c9
      NVDA_HARNESS_COMMIT: 5d92106f17e461dac62aa48257bbbf4183e033d0
      PYTHON_VERSION: 3.13.12
    steps:
      - name: Check out ggsvelte
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check out the pinned upstream NVDA speech-spy harness
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: nvaccess/nvda
          ref: ${{ env.NVDA_HARNESS_COMMIT }}
          path: .manual-at/nvda
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: x64

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: cpython-${{ env.PYTHON_VERSION }}-windows-x86_64-none

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        if: inputs.target == 'local'
        with:
          bun-version: 1.3.14

      - name: Build the local release-shaped fixture
        if: inputs.target == 'local'
        shell: pwsh
        run: |
          bun install --frozen-lockfile
          bun run build
          bun run build:docs
          New-Item -ItemType Directory -Force .manual-at/evidence/${{ matrix.browser }} | Out-Null
          $server = Start-Process bun `
            -ArgumentList @('scripts/serve-docs.ts') `
            -PassThru `
            -RedirectStandardOutput '.manual-at/evidence/${{ matrix.browser }}/fixture-server.stdout.log' `
            -RedirectStandardError '.manual-at/evidence/${{ matrix.browser }}/fixture-server.stderr.log'
          "FIXTURE_SERVER_PID=$($server.Id)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "TARGET_URL=http://127.0.0.1:4173" | Out-File -FilePath $env:GITHUB_ENV -Append
          for ($attempt = 0; $attempt -lt 60; $attempt++) {
            try {
              $response = Invoke-WebRequest -UseBasicParsing 'http://127.0.0.1:4173/examples/interactions/inspection'
              if ($response.StatusCode -eq 200) { exit 0 }
            } catch {
              Start-Sleep -Seconds 1
            }
          }
          throw 'The local built fixture did not become ready.'

      - name: Select and verify the live fixture
        if: inputs.target == 'live'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .manual-at/evidence/${{ matrix.browser }} | Out-Null
          $targetUrl = 'https://ljodea.github.io/ggsvelte'
          $response = Invoke-WebRequest -UseBasicParsing "$targetUrl/examples/interactions/inspection"
          if ($response.StatusCode -ne 200) { throw "Live fixture returned $($response.StatusCode)." }
          "TARGET_URL=$targetUrl" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Verify headed browser installations
        shell: pwsh
        run: |
          $paths = @{
            chrome = 'C:\Program Files\Google\Chrome\Application\chrome.exe'
            firefox = 'C:\Program Files\Mozilla Firefox\firefox.exe'
          }
          $browserPath = $paths['${{ matrix.browser }}']
          if (-not (Test-Path $browserPath)) { throw "Browser executable is missing: $browserPath" }
          $version = (Get-Item $browserPath).VersionInfo.ProductVersion
          "browser=${{ matrix.browser }}`nversion=$version`nexecutable=$browserPath" |
            Set-Content -Encoding utf8 .manual-at/evidence/${{ matrix.browser }}/browser.txt

      - name: Download, verify, and install official NVDA
        shell: pwsh
        run: |
          $installer = "$env:RUNNER_TEMP\nvda_$env:NVDA_VERSION.exe"
          $url = "https://github.com/nvaccess/nvda/releases/download/release-$env:NVDA_VERSION/nvda_$env:NVDA_VERSION.exe"
          Invoke-WebRequest -UseBasicParsing $url -OutFile $installer
          $actual = (Get-FileHash -Algorithm SHA256 $installer).Hash.ToLowerInvariant()
          if ($actual -ne $env:NVDA_SHA256) {
            throw "NVDA installer checksum mismatch: expected $env:NVDA_SHA256, received $actual"
          }
          $installLog = "$env:RUNNER_TEMP\nvda-install.log"
          $process = Start-Process $installer `
            -ArgumentList @('--install-silent', '--debug-logging', '--log-file', $installLog) `
            -PassThru
          $process | Wait-Process -Timeout 180
          if ($process.ExitCode -ne 0) { throw "NVDA installer exited with $($process.ExitCode)." }
          Copy-Item $installLog .manual-at/evidence/${{ matrix.browser }}/nvda-install.log
          $nvda = 'C:\Program Files (x86)\NVDA\nvda.exe'
          if (-not (Test-Path $nvda)) { $nvda = 'C:\Program Files\NVDA\nvda.exe' }
          if (-not (Test-Path $nvda)) { throw 'The installed NVDA executable was not found.' }
          $version = (Get-Item $nvda).VersionInfo.ProductVersion
          "version=$version`ninstaller_sha256=$actual`nharness_commit=$env:NVDA_HARNESS_COMMIT" |
            Set-Content -Encoding utf8 .manual-at/evidence/${{ matrix.browser }}/nvda.txt

      - name: Add the ggsvelte journeys to the upstream Robot harness
        shell: pwsh
        run: |
          Copy-Item scripts/manual-at/windows/ggsvelte_at.robot .manual-at/nvda/tests/system/robot/
          Copy-Item scripts/manual-at/windows/ggsvelte_at.py .manual-at/nvda/tests/system/robot/

      - name: Run real NVDA against the headed browser
        working-directory: .manual-at/nvda
        shell: pwsh
        env:
          BROWSER: ${{ matrix.browser }}
          RELEASE: ${{ inputs.release }}
          PROFILE: ${{ inputs.profile }}
          EVIDENCE_DIR: ${{ github.workspace }}\.manual-at\evidence\${{ matrix.browser }}
        run: |
          .\runsystemtests.bat `
            --variable whichNVDA:installed `
            --variable browser:$env:BROWSER `
            --variable targetUrl:$env:TARGET_URL `
            --variable evidenceDir:$env:EVIDENCE_DIR `
            --variable release:$env:RELEASE `
            --variable profile:$env:PROFILE `
            --include ggsvelte_at
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Preserve exact speech, Robot reports, screenshots, and NVDA logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: manual-at-nvda-${{ matrix.browser }}-${{ inputs.target }}-${{ inputs.profile }}-${{ github.run_id }}
          path: |
            .manual-at/evidence/${{ matrix.browser }}/
            .manual-at/nvda/testOutput/system/
          if-no-files-found: error
          retention-days: 30

      - name: Stop the local fixture server
        if: always() && inputs.target == 'local'
        shell: pwsh
        run: |
          if ($env:FIXTURE_SERVER_PID) {
            Stop-Process -Id $env:FIXTURE_SERVER_PID -Force -ErrorAction SilentlyContinue
          }
