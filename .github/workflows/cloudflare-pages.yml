# Build and deploy the root-hosted docs artifact to Cloudflare Pages.
# Direct upload is intentional: the account's native Pages GitHub App is
# unavailable (API 8000011). The token is scoped to account-level Pages Write.
name: Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/cloudflare-pages.yml"
      - "apps/docs/**"
      - "packages/**"
      - "examples/**"
      - "scripts/**"
      - "lifecycle.json"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "tsconfig.base.json"
      - "mise.toml"
  workflow_dispatch:

permissions: {}

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: false

jobs:
  deploy:
    name: build and deploy immutable artifact
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: cloudflare-production
      url: ${{ steps.deploy.outputs.deployment-url }}
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      DEPLOY_COMMIT: ${{ github.sha }}
      DOCS_BUILD_MODE: cloudflare-production
    steps:
      - name: Checkout immutable source commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build and validate Cloudflare artifact
        env:
          ANALYTICS_TOKEN: ${{ secrets.DOCS_ANALYTICS_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          export CF_PAGES_COMMIT_SHA="${DEPLOY_COMMIT}"
          if [ -n "${ANALYTICS_TOKEN}" ]; then
            export DOCS_ANALYTICS_TOKEN="${ANALYTICS_TOKEN}"
          fi
          bun run build:cloudflare
      - name: Deploy exact artifact to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          output=$(bunx wrangler pages deploy apps/docs/build \
            --project-name ggsvelte \
            --branch main \
            --commit-hash "${DEPLOY_COMMIT}" \
            --commit-dirty=false)
          printf '%s\n' "${output}"
          deployment_url=$(printf '%s\n' "${output}" | grep -Eo 'https://[^[:space:]]+\.pages\.dev' | tail -1)
          test -n "${deployment_url}"
          printf 'deployment-url=%s\n' "${deployment_url}" >> "${GITHUB_OUTPUT}"
