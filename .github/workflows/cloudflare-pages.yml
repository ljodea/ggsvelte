# Build and deploy the root-hosted docs artifact to Cloudflare Pages.
# Direct upload is intentional: the account's native Pages GitHub App is
# unavailable (API 8000011). The token is scoped to account-level Pages Write.
#
# Build and deploy are separate jobs so superseded main pushes cancel only the
# build. Once deploy starts, cancel-in-progress is off: production must finish
# smoke after wrangler activates, or an intermediate cancel could leave an
# unverified artifact live.
name: Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/cloudflare-pages.yml"
      - "apps/docs/**"
      - "packages/**"
      - "examples/**"
      - "scripts/**"
      - "lifecycle.json"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "tsconfig.base.json"
      - "mise.toml"
  workflow_dispatch:

permissions: {}

jobs:
  build:
    name: build immutable artifact
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      # Cancel superseded builds. Main lands package refactors in bursts; each
      # push rebuilds the docs artifact. Queuing every intermediate build is
      # wasteful; deploy (below) is not cancelled mid-flight.
      group: cloudflare-pages-build
      cancel-in-progress: true
    env:
      DEPLOY_COMMIT: ${{ github.sha }}
      DOCS_BUILD_MODE: cloudflare-production
    steps:
      - name: Checkout immutable source commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build and validate Cloudflare artifact
        env:
          ANALYTICS_TOKEN: ${{ secrets.DOCS_ANALYTICS_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          export CF_PAGES_COMMIT_SHA="${DEPLOY_COMMIT}"
          if [ -n "${ANALYTICS_TOKEN}" ]; then
            export DOCS_ANALYTICS_TOKEN="${ANALYTICS_TOKEN}"
          fi
          bun run build:cloudflare
      - name: Upload docs build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cloudflare-docs-build-${{ github.sha }}
          path: apps/docs/build
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: deploy and smoke
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      # Serialize production flips; do not cancel a deploy that already started
      # (smoke must verify the artifact that went live).
      group: cloudflare-pages-deploy
      cancel-in-progress: false
    environment:
      name: cloudflare-production
      url: ${{ steps.deploy.outputs.deployment-url }}
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      DEPLOY_COMMIT: ${{ github.sha }}
    steps:
      - name: Checkout for smoke scripts
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Download docs build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cloudflare-docs-build-${{ github.sha }}
          path: apps/docs/build
      - name: Deploy exact artifact to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          output=$(bunx wrangler pages deploy apps/docs/build \
            --project-name ggsvelte \
            --branch main \
            --commit-hash "${DEPLOY_COMMIT}" \
            --commit-dirty=false)
          printf '%s\n' "${output}"
          deployment_url=$(printf '%s\n' "${output}" | grep -Eo 'https://[^[:space:]]+\.pages\.dev' | tail -1)
          test -n "${deployment_url}"
          printf 'deployment-url=%s\n' "${deployment_url}" >> "${GITHUB_OUTPUT}"
      - name: Verify immutable assets on the new deployment
        env:
          # Env-indirection: step outputs must not expand into the script body (zizmor).
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        shell: bash
        run: |
          set -euo pipefail
          bun scripts/deployment-asset-smoke-cli.ts \
            --base-url "${DEPLOYMENT_URL}" \
            --paths / /guide/getting-started /examples /playground
