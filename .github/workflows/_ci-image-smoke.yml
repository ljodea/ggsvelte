# TEMPORARY smoke test for PR #584 — proves the prebaked GHCR ci-runner image
# pulls in a real container job via the exact `${{ github.repository }}`
# expression used by the flipped jobs, and that unzip + setup-bun work. Removed
# before merge (squash collapses it away).
name: _ci-image-smoke

on:
  push:
    branches: [ci/flip-container-image-ghcr]

permissions:
  contents: read

jobs:
  smoke:
    name: pull prebaked image + verify unzip/setup-bun
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/ci-runner:v1.61.1-noble
    defaults:
      run:
        shell: bash
    steps:
      - name: unzip present in image (no apt step)
        run: |
          set -euo pipefail
          command -v unzip
          unzip -v | head -1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: bun works (setup-bun unzipped the release)
        run: bun --version
