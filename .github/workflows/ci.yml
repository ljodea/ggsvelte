# ggsvelte CI (plan M0b + path routing). Parallel jobs after a cached bun install.
# All third-party actions pinned by full commit SHA (zizmor-enforced).
#
# Linux jobs use repo self-hosted runners labeled `ggsvelte` (ops tooling
# lives outside this FOSS tree). Privileged write/OIDC workflows (release,
# pages deploy, vr-approve, bench-trend) stay on GitHub-hosted runners so a
# compromised CI workspace cannot harvest publish credentials. Windows/macOS
# matrix rows and manual AT stay hosted as well.
#
# Path routing: scripts/ci-routing.ts classifies the changed file set and
# emits per-job flags. Expensive jobs are skipped when their inputs did not
# change (docs-only, workflow-only, markdown-only, …). The `ci-gate` job is
# the single required aggregator so skipped jobs do not look like missing
# checks. Product force (lockfile / ci-routing) schedules browser+package
# surfaces; pure CI plumbing (this file's action pins, .github/actions) only
# runs the cheap security/lint surface — see forceProduct in routing.ts.
#
# Content-hash skip (issue #245): when a job is still scheduled, it may
# early-exit success if a validated success marker / packages-dist cache
# exists for the same physical execution identity (content hash of
# JOB_CONTENT_INPUTS + recipe). Success-marker jobs use local composites
# (.github/actions/ci-content-hash-restore|write); packages-dist keeps its
# specialized dist-payload path. bypass_content_cache disables short-circuit
# under force-all / lockfile / ci.yml / ci-routing / .github/actions changes
# so recipe pin bumps re-execute jobs that *are* scheduled; the next product
# PR also misses cache because those paths are UNIVERSAL_CONTENT_INPUTS.
# Invalidate by bumping CONTENT_HASH_SCHEMA, editing a matched input, or
# setting repo variable CI_DISABLE_CONTENT_HASH=1. GHA cache is ref-scoped
# (not a cross-PR registry). Exact cache keys only — no restore-keys for
# job markers.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded runs on PRs/branches; never cancel main.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Heavy-job pool policy (issues #247, #319, #321):
# The self-hosted pool runs cpuset-isolated lanes. Two runner services carry
# the `ggsvelte-heavy` label, each pinned to 4 dedicated host vCPUs; light
# runners are pinned to 2 vCPUs each. CPU-heavy jobs opt into the heavy lane
# via `runs-on: [self-hosted, ggsvelte, ggsvelte-heavy]`, so at most two run
# concurrently and browser/Vitest worker auto-detection sees the allocated
# CPU count (a docker shim applies the same cpuset to job containers).
# - Light jobs (detect-changes, checks, unit, actions-security,
#   vr-baseline-guard, compatibility-matrix, ci-gate) keep `ggsvelte` only and
#   run freely; they may spill onto idle heavy runners without harm.
# - Informational interaction-perf uses the heavy lane despite being excluded
#   from ci-gate; it is CPU-heavy even though it is not required.
# - Runner services share HOME; every Bun install uses a job-private
#   runner.temp cache so concurrent restores cannot race.
# - Job-started/completed hooks on the runners log host telemetry (load, PSI,
#   memory, disk) so infra contention can be told apart from regressions.

env:
  # Keep in sync with: spikes/browser devDependency "playwright" and the
  # `component` job's container image below. The sync is asserted in a step.
  PLAYWRIGHT_CONTAINER_TAG: v1.61.1-noble

jobs:
  detect-changes:
    name: detect-changes (path routing)
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
      # pull-requests:read not required — we use event SHAs, not the API.
    outputs:
      checks: ${{ steps.route.outputs.checks }}
      unit: ${{ steps.route.outputs.unit }}
      component: ${{ steps.route.outputs.component }}
      consumer: ${{ steps.route.outputs.consumer }}
      build: ${{ steps.route.outputs.build }}
      actions_security: ${{ steps.route.outputs.actions_security }}
      bench_smoke: ${{ steps.route.outputs.bench_smoke }}
      interaction_perf: ${{ steps.route.outputs.interaction_perf }}
      packages_dist: ${{ steps.route.outputs.packages_dist }}
      vr: ${{ steps.route.outputs.vr }}
      pages: ${{ steps.route.outputs.pages }}
      bypass_content_cache: ${{ steps.route.outputs.bypass_content_cache }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - id: route
        name: classify changed paths → job flags
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          # PR base SHA is trustworthy; push uses the pre-push tip (may be zeros
          # on a newly created branch — force-all in that case).
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          # Issue #246: run-compat must force consumer after path routing.
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        shell: bash
        run: |
          set -euo pipefail
          zero="0000000000000000000000000000000000000000"
          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "${zero}" ]; then
            echo "no usable base SHA — force-all"
            bun scripts/ci-routing.ts emit-github-output --force-all
          else
            # Ensure the base object exists for the three-dot diff.
            git fetch --no-tags --depth=1 origin "${BASE_SHA}" 2>/dev/null || true
            if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
              echo "base SHA ${BASE_SHA} not resolvable — force-all"
              bun scripts/ci-routing.ts emit-github-output --force-all
            else
              # --name-status keeps rename/copy source paths for classification.
              mapfile -t files < <(git diff --name-status "${BASE_SHA}...${HEAD_SHA}" || true)
              if [ "${#files[@]}" -eq 0 ]; then
                # Empty diff (empty commit / metadata-only): still run cheap checks.
                echo "empty changed-file set — checks-only routing"
                printf '' | bun scripts/ci-routing.ts emit-github-output --stdin
              else
                printf '%s\n' "${files[@]}" | bun scripts/ci-routing.ts emit-github-output --stdin
                echo "event=${EVENT_NAME} base=${BASE_SHA} head=${HEAD_SHA} files=${#files[@]}"
                # Issue #244: main push re-running the full suite saturates the pool.
                # Keep thinner main surface (checks/unit/build/actions-security);
                # consumer/bench stay PR-primary. force-all paths still full-suite
                # when base is missing.
                # Keep packages_dist + component path-routed on main so Codecov
                # can refresh the packages/svelte flag for branch/main badges
                # (carryforward cannot bootstrap a first main-branch report).
                if [ "${EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/main" ]; then
                  {
                    echo "consumer=false"
                    echo "bench_smoke=false"
                    echo "interaction_perf=false"
                  } >> "$GITHUB_OUTPUT"
                  echo "main push: thinned consumer/bench (issue #244); packages_dist+component stay path-routed for coverage"
                fi
              fi
            fi
          fi
          # Issue #246: run-compat is an escape hatch for the full required
          # consumer matrix even when path routing would skip (docs-only PRs).
          # Applied after routing / #244 thinning so the label always wins on PRs.
          if [ "${EVENT_NAME}" = "pull_request" ] &&
            printf '%s' "${PR_LABELS:-}" | tr ',' '\n' | grep -qx 'run-compat'; then
            {
              echo "consumer=true"
              echo "packages_dist=true"
            } >> "$GITHUB_OUTPUT"
            echo "run-compat: forced consumer + packages_dist (issue #246)"
          fi

  # Early package build shared by component / consumer / interaction-perf
  # (issue #241). Unit and bench-smoke keep the cheaper `bun run check`
  # (spec/core only) and do not wait on this job.
  packages-dist:
    name: packages-dist (build + upload packages/*/dist)
    needs: detect-changes
    if: needs.detect-changes.outputs.packages_dist == 'true'
    runs-on: [self-hosted, ggsvelte, ggsvelte-heavy]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - id: content_hash
        name: compute content-hash (packages_dist)
        env:
          BYPASS: ${{ needs.detect-changes.outputs.bypass_content_cache }}
          DISABLE: ${{ vars.CI_DISABLE_CONTENT_HASH }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${BYPASS:-}" = "true" ] || [ "${DISABLE:-}" = "1" ]; then
            {
              echo "bypass=true"
              echo "hit=false"
            } >> "$GITHUB_OUTPUT"
            echo "content-hash bypassed for packages_dist"
            exit 0
          fi
          echo "bypass=false" >> "$GITHUB_OUTPUT"
          bun scripts/ci-routing.ts hash-inputs --execution packages_dist --os "${RUNNER_OS}"
      - id: dist_cache
        name: restore packages-dist content-hash cache
        if: steps.content_hash.outputs.bypass != 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          # Exact key only (no restore-keys) — incomplete or wrong-tree hits are unsafe.
          path: .packages-dist-cache
          key: ${{ steps.content_hash.outputs.cache_key }}
      - id: restore_dist
        name: materialize packages/*/dist from content-hash cache
        if: steps.content_hash.outputs.bypass != 'true' && steps.dist_cache.outputs.cache-hit == 'true'
        shell: bash
        run: |
          set -euo pipefail
          for pkg in spec core svelte; do
            src=".packages-dist-cache/packages/${pkg}/dist"
            if [ ! -d "${src}" ]; then
              echo "incomplete content-hash cache (missing ${src}) — will rebuild"
              echo "hit=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          mkdir -p packages/spec packages/core packages/svelte
          rm -rf packages/spec/dist packages/core/dist packages/svelte/dist
          cp -a .packages-dist-cache/packages/spec/dist packages/spec/
          cp -a .packages-dist-cache/packages/core/dist packages/core/
          cp -a .packages-dist-cache/packages/svelte/dist packages/svelte/
          echo "hit=true" >> "$GITHUB_OUTPUT"
          echo "packages-dist: restored from content-hash cache"
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        if: steps.restore_dist.outputs.hit != 'true'
        with:
          path: ${{ runner.temp }}/bun-install-cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - if: steps.restore_dist.outputs.hit != 'true'
        run: bun install --frozen-lockfile
        env:
          BUN_INSTALL_CACHE_DIR: ${{ runner.temp }}/bun-install-cache
      - name: build packages (tsc -b + svelte-package)
        if: steps.restore_dist.outputs.hit != 'true'
        run: bun run build
      - name: verify required package dist outputs
        shell: bash
        run: |
          set -euo pipefail
          for path in \
            packages/spec/dist/index.js \
            packages/core/dist/index.js \
            packages/svelte/dist/index.js; do
            if [ ! -f "${path}" ]; then
              echo "::error::missing required dist output: ${path}"
              exit 1
            fi
          done
          echo "packages-dist: verified spec/core/svelte dist entrypoints"
      - name: stage packages/*/dist under a single upload root
        # Multi-path upload strips the common prefix, so consumers would see
        # spec/dist instead of packages/spec/dist. Stage once and upload that tree.
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .packages-dist-upload
          mkdir -p .packages-dist-upload/packages/spec \
            .packages-dist-upload/packages/core \
            .packages-dist-upload/packages/svelte
          cp -a packages/spec/dist .packages-dist-upload/packages/spec/
          cp -a packages/core/dist .packages-dist-upload/packages/core/
          cp -a packages/svelte/dist .packages-dist-upload/packages/svelte/
      - name: stage content-hash cache payload for save
        if: steps.restore_dist.outputs.hit != 'true' && steps.content_hash.outputs.bypass != 'true'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .packages-dist-cache
          mkdir -p .packages-dist-cache/packages/spec \
            .packages-dist-cache/packages/core \
            .packages-dist-cache/packages/svelte
          cp -a packages/spec/dist .packages-dist-cache/packages/spec/
          cp -a packages/core/dist .packages-dist-cache/packages/core/
          cp -a packages/svelte/dist .packages-dist-cache/packages/svelte/
      - name: upload packages/*/dist for same-run consumers
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # Same-run artifact identity. Cross-run reuse is the content-hash cache above.
          name: packages-dist
          # Single directory root → download path: packages restores packages/*/dist.
          path: .packages-dist-upload/packages
          if-no-files-found: error
          retention-days: 1

  checks:
    name: checks (pre-commit stage)
    needs: detect-changes
    if: needs.detect-changes.outputs.checks == 'true'
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ runner.temp }}/bun-install-cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
        env:
          BUN_INSTALL_CACHE_DIR: ${{ runner.temp }}/bun-install-cache
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv tool install pre-commit
      # Pre-commit stage only. Pre-push parity (build, unit, svelte-check, knip,
      # type-aware lint, examples/docs check) is covered by dedicated jobs so we
      # do not pay for them twice on every PR.
      - name: pre-commit stage (parity)
        run: pre-commit run --all-files --show-diff-on-failure

  unit:
    name: unit (bun test spec + core)
    needs: detect-changes
    if: needs.detect-changes.outputs.unit == 'true'
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Full history: packages/spec manual-AT alias audit tests git-show
          # hard-coded historical commits (shallow clone would fail unit).
          fetch-depth: 0
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: ./.github/actions/ci-content-hash-restore
        id: content_hash
        with:
          execution: unit
          bypass: ${{ needs.detect-changes.outputs.bypass_content_cache }}
          disable: ${{ vars.CI_DISABLE_CONTENT_HASH }}
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        if: steps.content_hash.outputs.hit != 'true'
        with:
          path: ${{ runner.temp }}/bun-install-cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - if: steps.content_hash.outputs.hit != 'true'
        run: bun install --frozen-lockfile
        env:
          BUN_INSTALL_CACHE_DIR: ${{ runner.temp }}/bun-install-cache
      - name: build spec/core dist (package exports point at dist/)
        if: steps.content_hash.outputs.hit != 'true'
        run: bun run check
      # lcov for Codecov; text reporter still prints a summary in the log.
      - if: steps.content_hash.outputs.hit != 'true'
        run: >
          bun test --coverage --coverage-reporter=lcov
          --coverage-dir=coverage/unit
          packages/spec packages/core benchmarks scripts tests/evals
      - name: Upload unit coverage to Codecov
        # Custom if overrides default success() — keep the success gate so a
        # failed suite does not upload a partial report or count as green.
        if: success() && steps.content_hash.outputs.hit != 'true'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/unit/lcov.info
          flags: unit
          name: unit
          # Pin the uploader binary; the action's default is "latest".
          version: v11.3.1
          disable_search: true
          fail_ci_if_error: true
      - uses: ./.github/actions/ci-content-hash-write
        # Require success so a Codecov upload failure cannot green-cache the job.
        if: success() && steps.content_hash.outputs.hit != 'true' && steps.content_hash.outputs.bypass != 'true'
        with:
          execution: unit
          hash: ${{ steps.content_hash.outputs.hash }}

  compatibility-matrix:
    name: compatibility matrix (machine-checked source)
    needs: detect-changes
    if: needs.detect-changes.outputs.consumer == 'true'
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - id: matrix
        name: emit packed-consumer matrix (PR default vs full required)
        # Issue #246: PRs run one Linux consumer row by default; full required
        # matrix when labeled run-compat (detect-changes also forces consumer
        # + packages_dist so the label works on docs-only PRs). Main push stays
        # thinned per #244 (consumer PR-primary). Nightly covers expanded rows.
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        shell: bash
        run: |
          set -euo pipefail
          flavor=required
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            flavor=pr
            if printf '%s' "${PR_LABELS}" | tr ',' '\n' | grep -qx 'run-compat'; then
              flavor=required
            fi
          fi
          echo "support-matrix flavor=${flavor} labels=${PR_LABELS:-}"
          echo "matrix=$(bun scripts/support-matrix.ts "${flavor}")" >> "$GITHUB_OUTPUT"

  consumer-compat:
    name: packed consumer (${{ matrix.os }}, Node ${{ matrix.node }}, ${{ matrix.packageManager }}, Svelte ${{ matrix.svelte }})
    needs: [detect-changes, compatibility-matrix, packages-dist]
    if: >-
      needs.detect-changes.outputs.consumer == 'true' &&
      needs.compatibility-matrix.result == 'success' &&
      needs.packages-dist.result == 'success'
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJSON(needs.compatibility-matrix.outputs.matrix) }}
    # Linux rows use the private self-hosted heavy lane; Windows/macOS stay on GitHub-hosted.
    runs-on: ${{ startsWith(matrix.os, 'ubuntu') && fromJSON('["self-hosted","ggsvelte","ggsvelte-heavy"]') || matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      # Resolved toolchain versions (not matrix majors alone) — Node/npm patch
      # bumps must miss the consumer success-marker cache (Codex P2 on #245).
      # Keep resolution in the job so the content-hash composite stays protocol-only.
      - id: consumer_runtime
        name: resolve consumer runtime toolchain versions
        shell: bash
        env:
          # env-indirection: matrix values must not expand into the script body (zizmor).
          MATRIX_PM: ${{ matrix.packageManager }}
          MATRIX_PM_VERSION: ${{ matrix.packageManagerVersion }}
        run: |
          set -euo pipefail
          RUNTIME_NODE="$(node -v)"
          case "${MATRIX_PM}" in
            npm) RUNTIME_PM_VER="$(npm -v)" ;;
            bun) RUNTIME_PM_VER="$(bun -v)" ;;
            pnpm)
              if command -v pnpm >/dev/null 2>&1; then
                RUNTIME_PM_VER="$(pnpm -v)"
              else
                RUNTIME_PM_VER="${MATRIX_PM_VERSION}"
              fi
              ;;
            *) RUNTIME_PM_VER="${MATRIX_PM_VERSION}" ;;
          esac
          {
            echo "runtime_node=${RUNTIME_NODE}"
            echo "runtime_pm_ver=${RUNTIME_PM_VER}"
          } >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/ci-content-hash-restore
        id: content_hash
        with:
          execution: consumer
          bypass: ${{ needs.detect-changes.outputs.bypass_content_cache }}
          disable: ${{ vars.CI_DISABLE_CONTENT_HASH }}
          matrix_node: ${{ matrix.node }}
          matrix_pm: ${{ matrix.packageManager }}
          matrix_pm_version: ${{ matrix.packageManagerVersion }}
          matrix_svelte: ${{ matrix.svelte }}
          runtime_node_version: ${{ steps.consumer_runtime.outputs.runtime_node }}
          runtime_pm_version: ${{ steps.consumer_runtime.outputs.runtime_pm_ver }}
      - if: steps.content_hash.outputs.hit != 'true'
        run: bun install --frozen-lockfile
        env:
          BUN_INSTALL_CACHE_DIR: ${{ runner.temp }}/bun-install-cache
      - name: download shared packages/*/dist
        if: steps.content_hash.outputs.hit != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: packages-dist
          # Producer uploads .packages-dist-upload/packages → extract as packages/.
          path: packages
      - name: verify downloaded package dist entrypoints
        if: steps.content_hash.outputs.hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          for path in \
            packages/spec/dist/index.js \
            packages/core/dist/index.js \
            packages/svelte/dist/index.js; do
            if [ ! -f "${path}" ]; then
              echo "::error::packages-dist artifact missing ${path} after download"
              find packages -maxdepth 3 -type d 2>/dev/null | head -40 || true
              exit 1
            fi
          done
      - name: type-check Svelte package source
        if: steps.content_hash.outputs.hit != 'true'
        run: bun run check:svelte
      - name: install tarballs in a clean consumer and exercise types, build, SSR, Node, and CLI
        if: steps.content_hash.outputs.hit != 'true'
        env:
          BUN_INSTALL_CACHE_DIR: ${{ runner.temp }}/bun-install-cache
          PACKAGE_MANAGER: ${{ matrix.packageManager }}
          PACKAGE_MANAGER_VERSION: ${{ matrix.packageManagerVersion }}
          SVELTE_VERSION: ${{ matrix.svelte }}
        run: bun scripts/consumer-compat.ts

      # Component surface is split for wall-clock (issue #243). All three schedule
      # when routing sets component=true; ci-gate requires every shard to succeed.
      - uses: ./.github/actions/ci-content-hash-write
        if: steps.content_hash.outputs.hit != 'true' && steps.content_hash.outputs.bypass != 'true'
        with:
          execution: consumer
          hash: ${{ steps.content_hash.outputs.hash }}

  component-svelte:
    name: component-svelte (packages/svelte vitest browser + ssr)

    needs: [detect-changes, packages-dist]
    if: >-
      needs.detect-changes.outputs.component == 'true' &&
      needs.packages-dist.result == 'success'
    runs-on: [self-hosted, ggsvelte, ggsvelte-heavy]
    env:
      # GitHub runs the container as root, while /github/home belongs to
      # pwuser. Firefox refuses that ownership mismatch.
      HOME: /root
    container:
      # Keep in sync with env.PLAYWRIGHT_CONTAINER_TAG above.
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    defaults:
      run:
        # The container's /bin/sh is dash, which rejects `set -o pipefail`.
        shell: bash
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: install unzip (playwright image lacks it; setup-bun needs it)
        run: apt-get update && apt-get install -y --no-install-recommends unzip
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: ./.github/actions/ci-content-hash-restore
        id: content_hash
        with:
          execution: component_svelte
          bypass: ${{ needs.detect-changes.outputs.bypass_content_cache }}
          disable: ${{ vars.CI_DISABLE_CONTENT_HASH }}
          container_tag: ${{ env.PLAYWRIGHT_CONTAINER_TAG }}
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        if: steps.content_hash.outputs.hit != 'true'
        with:
          path: ${{ runner.temp }}/bun-install-cache
          key: bun-container-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-container-${{ runner.os }}-
      - if: steps.content_hash.outputs.hit != 'true'
        run: bun install --frozen-lockfile
        env:
          BUN_INSTALL_CACHE_DIR: ${{ runner.temp }}/bun-install-cache
      - name: download shared packages/*/dist
        if: steps.content_hash.outputs.hit != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: packages-dist
          # Producer uploads .packages-dist-upload/packages → extract as packages/.
          path: packages
      - name: verify downloaded package dist entrypoints
        if: steps.content_hash.outputs.hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          for path in \
            packages/spec/dist/index.js \
            packages/core/dist/index.js \
            packages/svelte/dist/index.js; do
            if [ ! -f "${path}" ]; then
              echo "::error::packages-dist artifact missing ${path} after download"
              find packages -maxdepth 3 -type d 2>/dev/null | head -40 || true
              exit 1
            fi
          done
      - name: assert playwright npm/container version sync (packages/svelte)
        if: steps.content_hash.outputs.hit != 'true'
        run: |
          set -euo pipefail
          npm_version="$(cd packages/svelte && bun -e 'console.log(require("playwright/package.json").version)')"
          expected="v${npm_version}-noble"
          echo "packages/svelte playwright: ${npm_version}; container tag: ${PLAYWRIGHT_CONTAINER_TAG}"
          if [ "${expected}" != "${PLAYWRIGHT_CONTAINER_TAG}" ]; then
            echo "::error::playwright npm version in packages/svelte (${npm_version}) does not match pinned container tag (${PLAYWRIGHT_CONTAINER_TAG})"
            exit 1
          fi
      # Chromium collects browser v8 coverage (CDP; works under bun) and enforces
      # thresholds. Firefox/webkit stay coverage-free. SSR runs under bun without
      # --coverage: @vitest/coverage-v8 needs Node inspector Coverage APIs that
      # bun does not implement ("Coverage APIs are not supported"). Local
      # `test:coverage` can still collect SSR lcov under node for offline use.
      - name: component tests (packages/svelte, chromium + coverage)
        if: steps.content_hash.outputs.hit != 'true'
        working-directory: packages/svelte
        run: bunx --bun vitest run --coverage --project chromium
      - name: component tests (packages/svelte, firefox + webkit)
        if: steps.content_hash.outputs.hit != 'true'
        working-directory: packages/svelte
        run: bunx --bun vitest run --project firefox --project webkit
      - name: component tests (packages/svelte, SSR)
        if: steps.content_hash.outputs.hit != 'true'
        working-directory: packages/svelte
        run: bunx --bun vitest run --config vitest.ssr.config.ts
      - name: rewrite svelte lcov paths to monorepo root
        # vitest writes SF:src/lib/... relative to packages/svelte; Codecov
        # components filter packages/svelte/** so paths must be repo-rooted.
        if: success() && steps.content_hash.outputs.hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          f=packages/svelte/coverage/browser/lcov.info
          if [ ! -f "${f}" ]; then
            echo "::error::missing coverage file ${f}"
            exit 1
          fi
          # Idempotent: only prefix bare package-relative src/ paths.
          sed -i 's|^SF:src/|SF:packages/svelte/src/|' "${f}"
          sed -i 's|^SF:\./src/|SF:packages/svelte/src/|' "${f}"
      - name: ensure gpg for Codecov uploader (Playwright image)
        if: success() && steps.content_hash.outputs.hit != 'true'
        run: |
          set -euo pipefail
          if ! command -v gpg >/dev/null 2>&1; then
            apt-get update
            apt-get install -y --no-install-recommends gnupg
          fi
      - name: Upload packages/svelte coverage to Codecov
        # Custom if overrides default success() — keep the success gate so a
        # failed suite does not upload a partial report or count as green.
        if: success() && steps.content_hash.outputs.hit != 'true'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/svelte/coverage/browser/lcov.info
          flags: svelte
          name: svelte
          # Pin the uploader binary; the action's default is "latest".
          version: v11.3.1
          disable_search: true
          fail_ci_if_error: true
      - uses: ./.github/actions/ci-content-hash-write
        # Require success so a Codecov upload failure cannot green-cache the job.
        if: success() && steps.content_hash.outputs.hit != 'true' && steps.content_hash.outputs.bypass != 'true'
        with:
          execution: component_svelte
          hash: ${{ steps.content_hash.outputs.hash }}
      - name: upload packages/svelte failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: component-svelte-failure-artifacts
          path: packages/svelte/test-results/
          if-no-files-found: ignore
          retention-days: 7

