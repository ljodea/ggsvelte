        run: bun run lint:type-aware
      - name: knip
        if: steps.content_hash.outputs.hit != 'true'
        run: bun run knip
      - name: publint + attw (real gate — exports point at dist/)
        if: steps.content_hash.outputs.hit != 'true'
        run: bun run lint:package
