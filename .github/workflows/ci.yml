# ggsvelte CI (plan M0b). Parallel jobs after a cached bun install.
# All third-party actions pinned by full commit SHA (zizmor-enforced).
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded runs on PRs/branches; never cancel main.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  # Keep in sync with: spikes/browser devDependency "playwright" and the
  # `component` job's container image below. The sync is asserted in a step.
  PLAYWRIGHT_CONTAINER_TAG: v1.61.1-noble

jobs:
  checks:
    name: checks (pre-commit parity, both stages)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv tool install pre-commit
      - name: pre-commit stage (parity)
        run: pre-commit run --all-files --show-diff-on-failure
      - name: pre-push stage (parity)
        run: pre-commit run --all-files --hook-stage pre-push

  unit:
    name: unit (bun test spec + core)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: build spec/core dist (package exports point at dist/)
        run: bun run check
      - run: bun test packages/spec packages/core benchmarks scripts tests/evals

  component:
    name: component (vitest browser mode, pinned Playwright container)
    runs-on: ubuntu-latest
    container:
      # Keep in sync with env.PLAYWRIGHT_CONTAINER_TAG above.
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    defaults:
      run:
        # The container's /bin/sh is dash, which rejects `set -o pipefail`.
        shell: bash
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: install unzip (playwright image lacks it; setup-bun needs it)
        run: apt-get update && apt-get install -y --no-install-recommends unzip
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-container-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-container-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: assert playwright npm/container version sync
        run: |
          set -euo pipefail
          for pkg in spikes/browser packages/svelte; do
            npm_version="$(cd "$pkg" && bun -e 'console.log(require("playwright/package.json").version)')"
            expected="v${npm_version}-noble"
            echo "$pkg playwright: ${npm_version}; container tag: ${PLAYWRIGHT_CONTAINER_TAG}"
            if [ "${expected}" != "${PLAYWRIGHT_CONTAINER_TAG}" ]; then
              echo "::error::playwright npm version in ${pkg} (${npm_version}) does not match pinned container tag (${PLAYWRIGHT_CONTAINER_TAG})"
              exit 1
            fi
          done
          vr_version="$(bun -e 'console.log(require("@playwright/test/package.json").version)')"
          echo "root @playwright/test (VR suite): ${vr_version}; container tag: ${PLAYWRIGHT_CONTAINER_TAG}"
          if [ "v${vr_version}-noble" != "${PLAYWRIGHT_CONTAINER_TAG}" ]; then
            echo "::error::@playwright/test version (${vr_version}) does not match pinned container tag (${PLAYWRIGHT_CONTAINER_TAG})"
            exit 1
          fi
      - name: build spec/core dist (package exports point at dist/)
        run: bun run check
      - name: component tests (packages/svelte, vitest browser mode)
        working-directory: packages/svelte
        run: bun run --bun test
      - name: retired spike suites (browser + ssr projects)
        working-directory: spikes/browser
        run: bun run --bun test
      - name: build packaged interaction test target
        run: BASE_PATH=/ggsvelte bun run build:docs
      - name: interaction accessibility, keyboard, and touch journeys
        run: bun run test:visual -- interaction-accessibility.spec.ts
      - name: interaction performance p50/p95 gate
        run: bun run test:interaction-perf

  build:
    name: build (tsc -b, packaging lint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: build packages (tsc -b + svelte-package)
        run: bun run build
      - name: publint + attw (real gate — exports point at dist/)
        run: bun run lint:package
      - name: build static docs site (adapter-static; the deployable/VR target)
        run: bun run build:docs
      - name: verify packed Pages links and required R0 journeys
        run: bun run check:pages-links
      - name: upload built package output (when present)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packages-dist
          path: packages/*/dist
          if-no-files-found: ignore
          retention-days: 7

  actions-security:
    name: actions-security (actionlint + zizmor)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: actionlint (lockfile-installed wasm build)
        run: bun run lint:actions
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: zizmor
        run: uvx zizmor==1.26.1 .github/workflows

  bench-smoke:
    name: bench-smoke (mitata, 1k workload)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: build spec/core dist (benchmarks import the packages)
        run: bun run check
      - name: bench smoke (1k points; informal numbers, not a gate on values)
        run: bun run bench:smoke
      - name: retained-memory absolute and 20% regression gate
        run: bun run bench:memory:check

  vr-baseline-guard:
    # Container-only baseline policy (decision 0009): committed baselines may
    # ONLY land via vr-approve.yml's verified inert-artifact path, which
    # pushes same-repo vr-update/pr-<n> branches as ggsvelte-vr-bot. Any
    # other PR touching tests/visual/__screenshots__/ is rejected — this
    # closes the `SKIP=block-output-paths` local-commit loophole at the
    # merge gate.
    name: vr-baseline-guard (baselines land only via vr-approve)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: refuse baseline diffs outside the vr-approve flow
        env:
          # env-indirection: branch names / repo names are PR-controlled text
          # and must never be interpolated into the script itself.
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "${BASE_REF}"
          changed="$(git diff --name-only "origin/${BASE_REF}"...HEAD)"
          if ! printf '%s\n' "${changed}" | grep -q '^tests/visual/__screenshots__/'; then
            echo "no baseline changes in this PR — ok"
            exit 0
          fi
          if [ "${HEAD_REPO}" = "${BASE_REPO}" ] && printf '%s' "${HEAD_REF}" | grep -Eq '^vr-update/pr-[0-9]+$'; then
            echo "baseline changes from a same-repo vr-update branch (vr-approve flow) — ok"
            exit 0
          fi
          echo "::error::this PR changes tests/visual/__screenshots__/ but is not a same-repo vr-update/pr-<n> branch. Baselines are container-generated only: have a maintainer comment /approve-visuals on the PR, then merge the resulting vr-update branch (see vr-approve.yml and docs/decisions/0009)."
          exit 1
