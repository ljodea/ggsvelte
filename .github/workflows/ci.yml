      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: ./.github/actions/ci-content-hash-restore
        id: content_hash
        with:
          execution: bench_smoke
          bypass: ${{ needs.detect-changes.outputs.bypass_content_cache }}
          disable: ${{ vars.CI_DISABLE_CONTENT_HASH }}
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        if: steps.content_hash.outputs.hit != 'true'
        with:
          path: ${{ runner.temp }}/bun-install-cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - if: steps.content_hash.outputs.hit != 'true'
        run: bun install --frozen-lockfile
        env:
          BUN_INSTALL_CACHE_DIR: ${{ runner.temp }}/bun-install-cache
      - name: build spec/core dist (benchmarks import the packages)
        if: steps.content_hash.outputs.hit != 'true'
        run: bun run check
      - name: bench smoke (1k points; informal numbers, not a gate on values)
        if: steps.content_hash.outputs.hit != 'true'
        run: bun run bench:smoke
      - name: retained-memory absolute and 20% regression gate
        if: steps.content_hash.outputs.hit != 'true'
        run: bun run bench:memory:check
      - uses: ./.github/actions/ci-content-hash-write
        if: steps.content_hash.outputs.hit != 'true' && steps.content_hash.outputs.bypass != 'true'
        with:
          execution: bench_smoke
          hash: ${{ steps.content_hash.outputs.hash }}

  vr-baseline-guard:
    # Container-only baseline policy (decision 0009): committed baselines may
    # ONLY land via vr-approve.yml's verified inert-artifact path, which
    # pushes same-repo vr-update/pr-<n> branches as ggsvelte-vr-bot. Any
    # other PR touching tests/visual/__screenshots__/ is rejected — this
    # closes the `SKIP=block-output-paths` local-commit loophole at the
    # merge gate. Always runs on PRs (cheap git-diff check); not path-routed.
    name: vr-baseline-guard (baselines land only via vr-approve)
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: refuse baseline diffs outside the vr-approve flow
        env:
          # env-indirection: branch names / repo names are PR-controlled text
          # and must never be interpolated into the script itself.
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "${BASE_REF}"
          changed="$(git diff --name-only "origin/${BASE_REF}"...HEAD)"
          if ! printf '%s\n' "${changed}" | grep -q '^tests/visual/__screenshots__/'; then
            echo "no baseline changes in this PR — ok"
            exit 0
          fi
          if [ "${HEAD_REPO}" = "${BASE_REPO}" ] && printf '%s' "${HEAD_REF}" | grep -Eq '^vr-update/pr-[0-9]+$'; then
            echo "baseline changes from a same-repo vr-update branch (vr-approve flow) — ok"
            exit 0
          fi
          echo "::error::this PR changes tests/visual/__screenshots__/ but is not a same-repo vr-update/pr-<n> branch. Baselines are container-generated only: merge the source PR, then have a maintainer comment /approve-visuals on it and merge the resulting vr-update branch (see vr-approve.yml and docs/decisions/0009)."
          exit 1

  # Single required aggregator. Skipped jobs are OK when routing disabled them;
  # a required job that is skipped/failed/cancelled fails the gate.
  # interaction-perf is intentionally excluded (informational only).
  ci-gate:
    name: ci-gate (required aggregator)
    if: always()
    needs:
      - detect-changes
      - packages-dist
      - checks
      - unit
      - compatibility-matrix
      - consumer-compat
      - component-svelte
      - component-spikes
      - component-journeys
      - build
      - actions-security
      - bench-smoke
      - vr-baseline-guard
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: evaluate required jobs
        env:
          DETECT_RESULT: ${{ needs.detect-changes.result }}
          CHECKS_REQ: ${{ needs.detect-changes.outputs.checks }}
          UNIT_REQ: ${{ needs.detect-changes.outputs.unit }}
          COMPONENT_REQ: ${{ needs.detect-changes.outputs.component }}
          CONSUMER_REQ: ${{ needs.detect-changes.outputs.consumer }}
          BUILD_REQ: ${{ needs.detect-changes.outputs.build }}
          ACTIONS_REQ: ${{ needs.detect-changes.outputs.actions_security }}
          BENCH_REQ: ${{ needs.detect-changes.outputs.bench_smoke }}
          PACKAGES_DIST_REQ: ${{ needs.detect-changes.outputs.packages_dist }}
          CHECKS_RES: ${{ needs.checks.result }}
          UNIT_RES: ${{ needs.unit.result }}
          COMPONENT_SVELTE_RES: ${{ needs.component-svelte.result }}
          COMPONENT_SPIKES_RES: ${{ needs.component-spikes.result }}
          COMPONENT_JOURNEYS_RES: ${{ needs.component-journeys.result }}
          CONSUMER_RES: ${{ needs.consumer-compat.result }}
          BUILD_RES: ${{ needs.build.result }}
          ACTIONS_RES: ${{ needs.actions-security.result }}
          BENCH_RES: ${{ needs.bench-smoke.result }}
          PACKAGES_DIST_RES: ${{ needs.packages-dist.result }}
          VR_GUARD_RES: ${{ needs.vr-baseline-guard.result }}
          EVENT_NAME: ${{ github.event_name }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${DETECT_RESULT}" != "success" ]; then
            echo "::error::detect-changes failed — cannot trust routing"
            exit 1
          fi
          # vr/pages are enforced by their own workflows; interaction_perf is informational.
          # vr-baseline-guard is always required on pull_request.
          bun -e '
            import { evaluateGate, type JobName, type JobPlan, type JobResult } from "./scripts/ci-routing.ts";
            const env = process.env;
            const req = (k: string) => env[k] === "true";
            const required: JobPlan = {
              checks: req("CHECKS_REQ"),
              unit: req("UNIT_REQ"),
              component: req("COMPONENT_REQ"),
              consumer: req("CONSUMER_REQ"),
              build: req("BUILD_REQ"),
              actions_security: req("ACTIONS_REQ"),
              bench_smoke: req("BENCH_REQ"),
              interaction_perf: false,
              packages_dist: req("PACKAGES_DIST_REQ"),
              vr: false,
              pages: false,
            };
            const shard = (k: string): JobResult => (env[k] as JobResult) || "skipped";
            const componentShards = [
              shard("COMPONENT_SVELTE_RES"),
              shard("COMPONENT_SPIKES_RES"),
              shard("COMPONENT_JOURNEYS_RES"),
            ];
            // Issue #243: component is success only when every shard succeeds.
            let componentResult: JobResult = "skipped";
            if (componentShards.every((r) => r === "skipped")) componentResult = "skipped";
            else if (componentShards.every((r) => r === "success")) componentResult = "success";
            else if (componentShards.some((r) => r === "failure" || r === "cancelled"))
              componentResult = "failure";
            else componentResult = "unknown";
            const results: Partial<Record<JobName, JobResult>> = {
              checks: env.CHECKS_RES as JobResult,
              unit: env.UNIT_RES as JobResult,
              component: componentResult,
              consumer: env.CONSUMER_RES as JobResult,
              build: env.BUILD_RES as JobResult,
              actions_security: env.ACTIONS_RES as JobResult,
              bench_smoke: env.BENCH_RES as JobResult,
              packages_dist: env.PACKAGES_DIST_RES as JobResult,
            };
            const gate = evaluateGate(required, results);
            const failures = [...gate.failures];
            if (env.EVENT_NAME === "pull_request") {
              const guard = env.VR_GUARD_RES;
              if (guard !== "success" && guard !== "skipped") {
                // skipped only if the job if: filtered it out; on PR it always schedules.
                failures.push(`vr-baseline-guard:${guard}`);
              }
              if (guard === "skipped") {
                failures.push("vr-baseline-guard:skipped");
              }
            }
            if (failures.length) {
              console.error("ci-gate failed:", failures.join(", "));
              process.exit(1);
            }
            console.log("ci-gate ok");
          '
