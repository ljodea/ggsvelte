# ggsvelte CI (plan M0b + path routing). Parallel jobs after a cached bun install.
# All third-party actions pinned by full commit SHA (zizmor-enforced).
#
# Linux jobs use repo self-hosted runners labeled `ggsvelte` (ops tooling
# lives outside this FOSS tree). Privileged write/OIDC workflows (release,
# pages deploy, vr-approve, bench-trend) stay on GitHub-hosted runners so a
# compromised CI workspace cannot harvest publish credentials. Windows/macOS
# matrix rows and manual AT stay hosted as well.
#
# Path routing: scripts/ci-routing.ts classifies the changed file set and
# emits per-job flags. Expensive jobs are skipped when their inputs did not
# change (docs-only, workflow-only, markdown-only, …). The `ci-gate` job is
# the single required aggregator so skipped jobs do not look like missing
# checks. Product force (lockfile / ci-routing) schedules browser+package
# surfaces; pure CI plumbing (this file's action pins, .github/actions) only
# runs the cheap security/lint surface — see forceProduct in routing.ts.
#
# Content-hash skip (issue #245): when a job is still scheduled, it may
# early-exit success if a validated success marker / packages-dist cache
# exists for the same physical execution identity (content hash of
# JOB_CONTENT_INPUTS + recipe). Success-marker jobs use local composites
# (.github/actions/ci-content-hash-restore|write); packages-dist keeps its
# specialized dist-payload path. bypass_content_cache disables short-circuit
# under force-all / lockfile / ci.yml / ci-routing / .github/actions changes
# so recipe pin bumps re-execute jobs that *are* scheduled; the next product
# PR also misses cache because those paths are UNIVERSAL_CONTENT_INPUTS.
# Invalidate by bumping CONTENT_HASH_SCHEMA, editing a matched input, or
# setting repo variable CI_DISABLE_CONTENT_HASH=1. GHA cache is ref-scoped
# (not a cross-PR registry). Exact cache keys only — no restore-keys for
# job markers.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded runs on every ref — including main. Rapid merges used to
  # stack full suites behind a 2-slot heavy lane; only the latest commit per
  # ref is worth finishing. PR close/merge is handled by cancel-on-pr-close.yml
  # (concurrency alone does not cancel when no replacement run starts).
  cancel-in-progress: true

# Self-hosted pool (issues #247, #319, #321, throughput fix 2026-07):
# One cx53 host, four cpuset-isolated runners (4 vCPUs each), all labeled
# only `ggsvelte`. There is NO separate heavy/light GitHub label: that
# split was a lie once every runner carried both labels (same match set,
# zero scheduling effect) and a bottleneck when only two runners had
# `ggsvelte-heavy` while four "light" runners sat idle.
# - Every Linux job uses `runs-on: [self-hosted, ggsvelte]`. Concurrency
#   cap = 4 jobs host-wide (one per runner service). CPU isolation is
#   systemd CPUAffinity + docker cpuset shim, not GitHub labels.
# - Path routing + cancel-on-close + cancel-in-progress control *which*
#   work runs; labels do not invent free capacity.
# - Runner services share HOME; Bun installs use job-private runner.temp.
# - Job hooks log host telemetry (load, PSI, memory, disk).

env:
  # Keep in sync with: spikes/browser devDependency "playwright" and the
  # `component` job's container image below. The sync is asserted in a step.
  PLAYWRIGHT_CONTAINER_TAG: v1.61.1-noble

jobs:
  detect-changes:
    name: detect-changes (path routing)
    runs-on: [self-hosted, ggsvelte]
    permissions:
      actions: read
      contents: read
      # pull-requests:read not required — we use event SHAs, not the API.
    outputs:
      checks: ${{ steps.route.outputs.checks }}
      unit: ${{ steps.route.outputs.unit }}
      component: ${{ steps.route.outputs.component }}
      consumer: ${{ steps.route.outputs.consumer }}
      build: ${{ steps.route.outputs.build }}
      svelte_check: ${{ steps.route.outputs.svelte_check }}
      docs_site: ${{ steps.route.outputs.docs_site }}
      actions_security: ${{ steps.route.outputs.actions_security }}
      bench_smoke: ${{ steps.route.outputs.bench_smoke }}
      interaction_perf: ${{ steps.route.outputs.interaction_perf }}
      packages_dist: ${{ steps.route.outputs.packages_dist }}
      vr: ${{ steps.route.outputs.vr }}
      pages: ${{ steps.route.outputs.pages }}
      docs_journeys: ${{ steps.route.outputs.docs_journeys }}
      bypass_content_cache: ${{ steps.route.outputs.bypass_content_cache }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/ci-setup-bun
      - id: route
        name: classify changed paths → job flags
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          # PR base SHA is trustworthy; push uses the pre-push tip (may be zeros
          # on a newly created branch — force-all in that case).
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          # Issue #246: run-compat must force consumer after path routing.
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        shell: bash
        run: bash scripts/ci-detect-changes.sh

  # Early package build shared by component / consumer / interaction-perf
  # (issue #241). Unit and bench-smoke keep the cheaper `bun run check`
  # (spec/core only) and do not wait on this job.
  packages-dist:
    name: packages-dist (build + upload packages/*/dist)
    needs: detect-changes
    if: needs.detect-changes.outputs.packages_dist == 'true'
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/ci-job-packages-dist
        with:
          bypass_content_cache: ${{ needs.detect-changes.outputs.bypass_content_cache }}
          disable_content_hash: ${{ vars.CI_DISABLE_CONTENT_HASH }}

  checks:
    name: checks (pre-commit stage)
    needs: detect-changes
    if: needs.detect-changes.outputs.checks == 'true'
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/ci-job-checks

  unit:
    name: unit (bun test spec + core)
    needs: detect-changes
    if: needs.detect-changes.outputs.unit == 'true'
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/ci-job-unit
        with:
          bypass_content_cache: ${{ needs.detect-changes.outputs.bypass_content_cache }}
          disable_content_hash: ${{ vars.CI_DISABLE_CONTENT_HASH }}
          codecov_token: ${{ secrets.CODECOV_TOKEN }}

  compatibility-matrix:
    name: compatibility matrix (machine-checked source)
    needs: detect-changes
    if: needs.detect-changes.outputs.consumer == 'true'
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.job.outputs.matrix }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - id: job
        uses: ./.github/actions/ci-job-compatibility-matrix

  consumer-compat:
    name: packed consumer (${{ matrix.os }}, Node ${{ matrix.node }}, ${{ matrix.packageManager }}, Svelte ${{ matrix.svelte }})
    needs: [detect-changes, compatibility-matrix, packages-dist]
    if: >-
      needs.detect-changes.outputs.consumer == 'true' &&
      needs.compatibility-matrix.result == 'success' &&
      needs.packages-dist.result == 'success'
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJSON(needs.compatibility-matrix.outputs.matrix) }}
    # Linux rows use the private self-hosted ggsvelte pool; Windows/macOS stay on GitHub-hosted.
    runs-on: ${{ startsWith(matrix.os, 'ubuntu') && fromJSON('["self-hosted","ggsvelte"]') || matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/ci-job-consumer-compat
        with:
          bypass_content_cache: ${{ needs.detect-changes.outputs.bypass_content_cache }}
          disable_content_hash: ${{ vars.CI_DISABLE_CONTENT_HASH }}
          matrix_node: ${{ matrix.node }}
          matrix_package_manager: ${{ matrix.packageManager }}
          matrix_package_manager_version: ${{ matrix.packageManagerVersion }}
          matrix_svelte: ${{ matrix.svelte }}

  component-svelte:
    name: component-svelte (packages/svelte vitest browser + ssr)

    needs: [detect-changes, packages-dist]
    if: >-
      needs.detect-changes.outputs.component == 'true' &&
      needs.packages-dist.result == 'success'
    runs-on: [self-hosted, ggsvelte]
    env:
      # GitHub runs the container as root, while /github/home belongs to
      # pwuser. Firefox refuses that ownership mismatch.
      HOME: /root
    container:
      # Keep in sync with env.PLAYWRIGHT_CONTAINER_TAG above.
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    defaults:
      run:
        # The container's /bin/sh is dash, which rejects `set -o pipefail`.
        shell: bash
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/ci-job-component-svelte
        with:
          bypass_content_cache: ${{ needs.detect-changes.outputs.bypass_content_cache }}
          disable_content_hash: ${{ vars.CI_DISABLE_CONTENT_HASH }}
          codecov_token: ${{ secrets.CODECOV_TOKEN }}

  component-spikes:
    name: component-spikes (spikes/browser vitest)

    needs: [detect-changes, packages-dist]
    if: >-
      needs.detect-changes.outputs.component == 'true' &&
      needs.packages-dist.result == 'success'
    runs-on: [self-hosted, ggsvelte]
    env:
      # GitHub runs the container as root, while /github/home belongs to
      # pwuser. Firefox refuses that ownership mismatch.
      HOME: /root
    container:
      # Keep in sync with env.PLAYWRIGHT_CONTAINER_TAG above.
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    defaults:
      run:
        # The container's /bin/sh is dash, which rejects `set -o pipefail`.
        shell: bash
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/ci-job-component-spikes
        with:
          bypass_content_cache: ${{ needs.detect-changes.outputs.bypass_content_cache }}
          disable_content_hash: ${{ vars.CI_DISABLE_CONTENT_HASH }}

  component-journeys:
    # Non-pixel docs/structure/a11y journeys. Routed via docs_journeys so
    # content-only PRs still get structure coverage without VR pixels.
    name: component-journeys (docs a11y playwright)

    needs: [detect-changes, packages-dist]
    if: >-
      needs.detect-changes.outputs.docs_journeys == 'true' &&
      needs.packages-dist.result == 'success'
    runs-on: [self-hosted, ggsvelte]
    env:
      # GitHub runs the container as root, while /github/home belongs to
      # pwuser. Firefox refuses that ownership mismatch.
      HOME: /root
    container:
      # Keep in sync with env.PLAYWRIGHT_CONTAINER_TAG above.
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    defaults:
      run:
        # The container's /bin/sh is dash, which rejects `set -o pipefail`.
        shell: bash
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/ci-job-component-journeys
        with:
          bypass_content_cache: ${{ needs.detect-changes.outputs.bypass_content_cache }}
          disable_content_hash: ${{ vars.CI_DISABLE_CONTENT_HASH }}

  interaction-perf:
    name: interaction-perf (p50/p95, informational)
    needs: [detect-changes, packages-dist]
    if: >-
      needs.detect-changes.outputs.interaction_perf == 'true' &&
      needs.packages-dist.result == 'success'
    runs-on: [self-hosted, ggsvelte]
    env:
      HOME: /root
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    defaults:
      run:
        shell: bash
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/ci-job-interaction-perf

  build:
    name: build (packages + knip + type-aware + publint)
    needs: detect-changes
    if: needs.detect-changes.outputs.build == 'true'
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/ci-job-build
        with:
          bypass_content_cache: ${{ needs.detect-changes.outputs.bypass_content_cache }}
          disable_content_hash: ${{ vars.CI_DISABLE_CONTENT_HASH }}

  svelte-check:
    name: svelte-check (packages/svelte + apps/docs)
    needs: detect-changes
    if: needs.detect-changes.outputs.svelte_check == 'true'
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/ci-job-svelte-check
        with:
          bypass_content_cache: ${{ needs.detect-changes.outputs.bypass_content_cache }}
          disable_content_hash: ${{ vars.CI_DISABLE_CONTENT_HASH }}

  docs-site:
    name: docs-site (adapter-static build + pages links)
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_site == 'true'
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/ci-job-docs-site
        with:
          bypass_content_cache: ${{ needs.detect-changes.outputs.bypass_content_cache }}
          disable_content_hash: ${{ vars.CI_DISABLE_CONTENT_HASH }}

  actions-security:
    name: actions-security (actionlint + zizmor)
    needs: detect-changes
    if: needs.detect-changes.outputs.actions_security == 'true'
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/ci-job-actions-security
        with:
          bypass_content_cache: ${{ needs.detect-changes.outputs.bypass_content_cache }}
          disable_content_hash: ${{ vars.CI_DISABLE_CONTENT_HASH }}

  bench-smoke:
    name: bench-smoke (mitata, 1k workload)
    needs: detect-changes
    if: needs.detect-changes.outputs.bench_smoke == 'true'
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/ci-job-bench-smoke
        with:
          bypass_content_cache: ${{ needs.detect-changes.outputs.bypass_content_cache }}
          disable_content_hash: ${{ vars.CI_DISABLE_CONTENT_HASH }}

  vr-baseline-guard:
    # Same-PR smoke baselines allowed when paired with render-relevant paths
    # (packages/examples/visual tests/docs_render). Content-only docs paths do
    # not qualify. Legacy vr-update/pr-<n> bot path still allowed.
    name: vr-baseline-guard (same-PR smoke baselines)
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/ci-job-vr-baseline-guard

  ci-gate:
    name: ci-gate (required aggregator)
    if: always()
    needs:
      - detect-changes
      - packages-dist
      - checks
      - unit
      - compatibility-matrix
      - consumer-compat
      - component-svelte
      - component-spikes
      - component-journeys
      - build
      - svelte-check
      - docs-site
      - actions-security
      - bench-smoke
      - vr-baseline-guard
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/ci-job-ci-gate
        with:
          detect_result: ${{ needs.detect-changes.result }}
          checks_req: ${{ needs.detect-changes.outputs.checks }}
          unit_req: ${{ needs.detect-changes.outputs.unit }}
          component_req: ${{ needs.detect-changes.outputs.component }}
          consumer_req: ${{ needs.detect-changes.outputs.consumer }}
          build_req: ${{ needs.detect-changes.outputs.build }}
          svelte_check_req: ${{ needs.detect-changes.outputs.svelte_check }}
          docs_site_req: ${{ needs.detect-changes.outputs.docs_site }}
          actions_req: ${{ needs.detect-changes.outputs.actions_security }}
          bench_req: ${{ needs.detect-changes.outputs.bench_smoke }}
          packages_dist_req: ${{ needs.detect-changes.outputs.packages_dist }}
          docs_journeys_req: ${{ needs.detect-changes.outputs.docs_journeys }}
          checks_res: ${{ needs.checks.result }}
          unit_res: ${{ needs.unit.result }}
          component_svelte_res: ${{ needs.component-svelte.result }}
          component_spikes_res: ${{ needs.component-spikes.result }}
          docs_journeys_res: ${{ needs.component-journeys.result }}
          consumer_res: ${{ needs.consumer-compat.result }}
          build_res: ${{ needs.build.result }}
          svelte_check_res: ${{ needs.svelte-check.result }}
          docs_site_res: ${{ needs.docs-site.result }}
          actions_res: ${{ needs.actions-security.result }}
          bench_res: ${{ needs.bench-smoke.result }}
          packages_dist_res: ${{ needs.packages-dist.result }}
          vr_guard_res: ${{ needs.vr-baseline-guard.result }}
