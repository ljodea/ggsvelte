# ggsvelte CI (plan M0b + path routing). Parallel jobs after a cached bun install.
# All third-party actions pinned by full commit SHA (zizmor-enforced).
#
# Linux jobs use repo self-hosted runners labeled `ggsvelte` (ops tooling
# lives outside this FOSS tree). Privileged write/OIDC workflows (release,
# pages deploy, vr-approve, bench-trend) stay on GitHub-hosted runners so a
# compromised CI workspace cannot harvest publish credentials. Windows/macOS
# matrix rows and manual AT stay hosted as well.
#
# Path routing: scripts/ci-routing.ts classifies the changed file set and
# emits per-job flags. Expensive jobs are skipped when their inputs did not
# change (docs-only, workflow-only, markdown-only, …). The `ci-gate` job is
# the single required aggregator so skipped jobs do not look like missing
# checks. Changing this file forces the full surface (see ci_workflow lane).
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded runs on PRs/branches; never cancel main.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  # Keep in sync with: spikes/browser devDependency "playwright" and the
  # `component` job's container image below. The sync is asserted in a step.
  PLAYWRIGHT_CONTAINER_TAG: v1.61.1-noble

jobs:
  detect-changes:
    name: detect-changes (path routing)
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
      # pull-requests:read not required — we use event SHAs, not the API.
    outputs:
      checks: ${{ steps.route.outputs.checks }}
      unit: ${{ steps.route.outputs.unit }}
      component: ${{ steps.route.outputs.component }}
      consumer: ${{ steps.route.outputs.consumer }}
      build: ${{ steps.route.outputs.build }}
      actions_security: ${{ steps.route.outputs.actions_security }}
      bench_smoke: ${{ steps.route.outputs.bench_smoke }}
      interaction_perf: ${{ steps.route.outputs.interaction_perf }}
      vr: ${{ steps.route.outputs.vr }}
      pages: ${{ steps.route.outputs.pages }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - id: route
        name: classify changed paths → job flags
        env:
          EVENT_NAME: ${{ github.event_name }}
          # PR base SHA is trustworthy; push uses the pre-push tip (may be zeros
          # on a newly created branch — force-all in that case).
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          zero="0000000000000000000000000000000000000000"
          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "${zero}" ]; then
            echo "no usable base SHA — force-all"
            bun scripts/ci-routing.ts emit-github-output --force-all
            exit 0
          fi
          # Ensure the base object exists for the three-dot diff.
          git fetch --no-tags --depth=1 origin "${BASE_SHA}" 2>/dev/null || true
          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            echo "base SHA ${BASE_SHA} not resolvable — force-all"
            bun scripts/ci-routing.ts emit-github-output --force-all
            exit 0
          fi
          mapfile -t files < <(git diff --name-only "${BASE_SHA}...${HEAD_SHA}" || true)
          if [ "${#files[@]}" -eq 0 ]; then
            # Empty diff (empty commit / metadata-only): still run cheap checks.
            echo "empty changed-file set — checks-only routing"
            printf '' | bun scripts/ci-routing.ts emit-github-output --stdin
            exit 0
          fi
          printf '%s\n' "${files[@]}" | bun scripts/ci-routing.ts emit-github-output --stdin
          echo "event=${EVENT_NAME} base=${BASE_SHA} head=${HEAD_SHA} files=${#files[@]}"

  checks:
    name: checks (pre-commit stage)
    needs: detect-changes
    if: needs.detect-changes.outputs.checks == 'true'
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv tool install pre-commit
      # Pre-commit stage only. Pre-push parity (build, unit, svelte-check, knip,
      # type-aware lint, examples/docs check) is covered by dedicated jobs so we
      # do not pay for them twice on every PR.
      - name: pre-commit stage (parity)
        run: pre-commit run --all-files --show-diff-on-failure

  unit:
    name: unit (bun test spec + core)
    needs: detect-changes
    if: needs.detect-changes.outputs.unit == 'true'
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: build spec/core dist (package exports point at dist/)
        run: bun run check
      - run: bun test packages/spec packages/core benchmarks scripts tests/evals

  compatibility-matrix:
    name: compatibility matrix (machine-checked source)
    needs: detect-changes
    if: needs.detect-changes.outputs.consumer == 'true'
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - id: matrix
        name: emit required packed-consumer rows
        shell: bash
        run: echo "matrix=$(bun scripts/support-matrix.ts required)" >> "$GITHUB_OUTPUT"

  consumer-compat:
    name: packed consumer (${{ matrix.os }}, Node ${{ matrix.node }}, ${{ matrix.packageManager }}, Svelte ${{ matrix.svelte }})
    needs: [detect-changes, compatibility-matrix]
    if: needs.detect-changes.outputs.consumer == 'true' && needs.compatibility-matrix.result == 'success'
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJSON(needs.compatibility-matrix.outputs.matrix) }}
    # Linux rows use the private self-hosted pool; Windows/macOS stay on GitHub-hosted.
    runs-on: ${{ startsWith(matrix.os, 'ubuntu') && fromJSON('["self-hosted","ggsvelte"]') || matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: build release-shaped package contents
        run: bun run build
      - name: type-check Svelte package source
        run: bun run check:svelte
      - name: install tarballs in a clean consumer and exercise types, build, SSR, Node, and CLI
        env:
          PACKAGE_MANAGER: ${{ matrix.packageManager }}
          PACKAGE_MANAGER_VERSION: ${{ matrix.packageManagerVersion }}
          SVELTE_VERSION: ${{ matrix.svelte }}
        run: bun scripts/consumer-compat.ts

  component:
    name: component (vitest browser mode, pinned Playwright container)
    needs: detect-changes
    if: needs.detect-changes.outputs.component == 'true'
    runs-on: [self-hosted, ggsvelte]
    env:
      # GitHub runs the container as root, while /github/home belongs to
      # pwuser. Firefox refuses that ownership mismatch.
      HOME: /root
    container:
      # Keep in sync with env.PLAYWRIGHT_CONTAINER_TAG above.
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    defaults:
      run:
        # The container's /bin/sh is dash, which rejects `set -o pipefail`.
        shell: bash
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: install unzip (playwright image lacks it; setup-bun needs it)
        run: apt-get update && apt-get install -y --no-install-recommends unzip
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-container-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-container-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: assert playwright npm/container version sync
        run: |
          set -euo pipefail
          for pkg in spikes/browser packages/svelte; do
            npm_version="$(cd "$pkg" && bun -e 'console.log(require("playwright/package.json").version)')"
            expected="v${npm_version}-noble"
            echo "$pkg playwright: ${npm_version}; container tag: ${PLAYWRIGHT_CONTAINER_TAG}"
            if [ "${expected}" != "${PLAYWRIGHT_CONTAINER_TAG}" ]; then
              echo "::error::playwright npm version in ${pkg} (${npm_version}) does not match pinned container tag (${PLAYWRIGHT_CONTAINER_TAG})"
              exit 1
            fi
          done
          vr_version="$(bun -e 'console.log(require("@playwright/test/package.json").version)')"
          echo "root @playwright/test (VR suite): ${vr_version}; container tag: ${PLAYWRIGHT_CONTAINER_TAG}"
          if [ "v${vr_version}-noble" != "${PLAYWRIGHT_CONTAINER_TAG}" ]; then
            echo "::error::@playwright/test version (${vr_version}) does not match pinned container tag (${PLAYWRIGHT_CONTAINER_TAG})"
            exit 1
          fi
      - name: build all packages for browser and docs targets
        run: bun run build
      - name: component tests (packages/svelte, vitest browser mode)
        working-directory: packages/svelte
        run: bun run --bun test
      - name: retired spike suites (browser + ssr projects)
        working-directory: spikes/browser
        run: bun run --bun test
      - name: build packaged interaction test target
        run: BASE_PATH=/ggsvelte bun run build:docs
      - name: interaction and safe-playground accessibility journeys
        run: bun run test:visual -- interaction-accessibility.spec.ts playground.spec.ts
      - name: upload browser traces, screenshots, and reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: component-browser-failure-artifacts
          path: |
            packages/svelte/test-results/
            spikes/browser/test-results/
            tests/visual/test-results/
            tests/visual/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  # Informational only — not a required status check (excluded from ci-gate).
  # Absolute wall-clock p50/p95 budgets are noisy on the shared self-hosted
  # host (4 concurrent runners on 8 vCPU). Path-gated and independent of the
  # component job so it does not serialize the critical path. Hard gate remains
  # on `run-bench` PRs via bench.yml.
  interaction-perf:
    name: interaction-perf (p50/p95, informational)
    needs: detect-changes
    if: needs.detect-changes.outputs.interaction_perf == 'true'
    runs-on: [self-hosted, ggsvelte]
    env:
      HOME: /root
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    defaults:
      run:
        shell: bash
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: install unzip (playwright image lacks it; setup-bun needs it)
        run: apt-get update && apt-get install -y --no-install-recommends unzip
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-container-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-container-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: build packages and docs for interaction performance fixtures
        run: bun run build && BASE_PATH=/ggsvelte bun run build:docs
      - name: interaction performance p50/p95 gate
        run: bun run test:interaction-perf
      - name: upload interaction-perf failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: interaction-perf-failure-artifacts
          path: tests/performance/test-results/
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: build (tsc -b, packaging lint, static analysis)
    needs: detect-changes
    if: needs.detect-changes.outputs.build == 'true'
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: build packages (tsc -b + svelte-package)
        run: bun run build
      # Former pre-push hooks that are not duplicated by unit/component jobs.
      - name: svelte-check (packages/svelte)
        run: bun run check:svelte
      - name: svelte-check (apps/docs)
        run: bun run check:docs
      - name: tsc examples corpus
        run: bun run check:examples
      - name: oxlint --type-aware
        run: bun run lint:type-aware
      - name: knip
        run: bun run knip
      - name: publint + attw (real gate — exports point at dist/)
        run: bun run lint:package
      - name: build static docs site (adapter-static; the deployable/VR target)
        run: bun run build:docs
      - name: verify packed Pages links and required R0 journeys
        run: bun run check:pages-links
      - name: upload built package output (when present)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packages-dist
          path: packages/*/dist
          if-no-files-found: ignore
          retention-days: 7

  actions-security:
    name: actions-security (actionlint + zizmor)
    needs: detect-changes
    if: needs.detect-changes.outputs.actions_security == 'true'
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: actionlint (lockfile-installed wasm build)
        run: bun run lint:actions
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: zizmor
        run: uvx zizmor==1.26.1 .github/workflows

  bench-smoke:
    name: bench-smoke (mitata, 1k workload)
    needs: detect-changes
    if: needs.detect-changes.outputs.bench_smoke == 'true'
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: build spec/core dist (benchmarks import the packages)
        run: bun run check
      - name: bench smoke (1k points; informal numbers, not a gate on values)
        run: bun run bench:smoke
      - name: retained-memory absolute and 20% regression gate
        run: bun run bench:memory:check

  vr-baseline-guard:
    # Container-only baseline policy (decision 0009): committed baselines may
    # ONLY land via vr-approve.yml's verified inert-artifact path, which
    # pushes same-repo vr-update/pr-<n> branches as ggsvelte-vr-bot. Any
    # other PR touching tests/visual/__screenshots__/ is rejected — this
    # closes the `SKIP=block-output-paths` local-commit loophole at the
    # merge gate. Always runs on PRs (cheap git-diff check); not path-routed.
    name: vr-baseline-guard (baselines land only via vr-approve)
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: refuse baseline diffs outside the vr-approve flow
        env:
          # env-indirection: branch names / repo names are PR-controlled text
          # and must never be interpolated into the script itself.
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "${BASE_REF}"
          changed="$(git diff --name-only "origin/${BASE_REF}"...HEAD)"
          if ! printf '%s\n' "${changed}" | grep -q '^tests/visual/__screenshots__/'; then
            echo "no baseline changes in this PR — ok"
            exit 0
          fi
          if [ "${HEAD_REPO}" = "${BASE_REPO}" ] && printf '%s' "${HEAD_REF}" | grep -Eq '^vr-update/pr-[0-9]+$'; then
            echo "baseline changes from a same-repo vr-update branch (vr-approve flow) — ok"
            exit 0
          fi
          echo "::error::this PR changes tests/visual/__screenshots__/ but is not a same-repo vr-update/pr-<n> branch. Baselines are container-generated only: have a maintainer comment /approve-visuals on the PR, then merge the resulting vr-update branch (see vr-approve.yml and docs/decisions/0009)."
          exit 1

  # Single required aggregator. Skipped jobs are OK when routing disabled them;
  # a required job that is skipped/failed/cancelled fails the gate.
  # interaction-perf is intentionally excluded (informational only).
  ci-gate:
    name: ci-gate (required aggregator)
    if: always()
    needs:
      - detect-changes
      - checks
      - unit
      - compatibility-matrix
      - consumer-compat
      - component
      - build
      - actions-security
      - bench-smoke
      - vr-baseline-guard
    runs-on: [self-hosted, ggsvelte]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: evaluate required jobs
        env:
          DETECT_RESULT: ${{ needs.detect-changes.result }}
          CHECKS_REQ: ${{ needs.detect-changes.outputs.checks }}
          UNIT_REQ: ${{ needs.detect-changes.outputs.unit }}
          COMPONENT_REQ: ${{ needs.detect-changes.outputs.component }}
          CONSUMER_REQ: ${{ needs.detect-changes.outputs.consumer }}
          BUILD_REQ: ${{ needs.detect-changes.outputs.build }}
          ACTIONS_REQ: ${{ needs.detect-changes.outputs.actions_security }}
          BENCH_REQ: ${{ needs.detect-changes.outputs.bench_smoke }}
          CHECKS_RES: ${{ needs.checks.result }}
          UNIT_RES: ${{ needs.unit.result }}
          COMPONENT_RES: ${{ needs.component.result }}
          CONSUMER_RES: ${{ needs.consumer-compat.result }}
          BUILD_RES: ${{ needs.build.result }}
          ACTIONS_RES: ${{ needs.actions-security.result }}
          BENCH_RES: ${{ needs.bench-smoke.result }}
          VR_GUARD_RES: ${{ needs.vr-baseline-guard.result }}
          EVENT_NAME: ${{ github.event_name }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${DETECT_RESULT}" != "success" ]; then
            echo "::error::detect-changes failed — cannot trust routing"
            exit 1
          fi
          # vr/pages are enforced by their own workflows; interaction_perf is informational.
          # vr-baseline-guard is always required on pull_request.
          bun -e '
            import { evaluateGate, type JobName, type JobPlan, type JobResult } from "./scripts/ci-routing.ts";
            const env = process.env;
            const req = (k: string) => env[k] === "true";
            const required: JobPlan = {
              checks: req("CHECKS_REQ"),
              unit: req("UNIT_REQ"),
              component: req("COMPONENT_REQ"),
              consumer: req("CONSUMER_REQ"),
              build: req("BUILD_REQ"),
              actions_security: req("ACTIONS_REQ"),
              bench_smoke: req("BENCH_REQ"),
              interaction_perf: false,
              vr: false,
              pages: false,
            };
            const results: Partial<Record<JobName, JobResult>> = {
              checks: env.CHECKS_RES as JobResult,
              unit: env.UNIT_RES as JobResult,
              component: env.COMPONENT_RES as JobResult,
              consumer: env.CONSUMER_RES as JobResult,
              build: env.BUILD_RES as JobResult,
              actions_security: env.ACTIONS_RES as JobResult,
              bench_smoke: env.BENCH_RES as JobResult,
            };
            const gate = evaluateGate(required, results);
            const failures = [...gate.failures];
