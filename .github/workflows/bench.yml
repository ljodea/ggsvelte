# Benchmarks (plan M3).
#   - bench-label: PRs labeled 'run-bench' run the suite and gate on the
#     absolute budgets in benchmarks/budgets.json. Same-runner A/B
#     (baseline vs PR head on one machine) is future work — until then the
#     absolute budgets are deliberately loose to absorb runner variance.
# Trend history publishing is intentionally gone.
# All third-party actions pinned by full commit SHA (zizmor-enforced).
name: Bench

on:
  pull_request:
    types: [labeled]

permissions: {}

# Concurrency is per job, not workflow-level. pull_request:labeled fires for
# every label; a non-run-bench label must not cancel an in-flight budget gate.
jobs:
  bench-label:
    name: bench-label (budget gate on 'run-bench' PRs)
    if: github.event_name == 'pull_request' && github.event.label.name == 'run-bench'
    # Only the run-bench job joins this group; other labels skip the job and
    # therefore cannot supersede an active budget-gate run.
    concurrency:
      group: bench-label-${{ github.ref }}
      cancel-in-progress: true
    runs-on: [self-hosted, ggsvelte]
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    defaults:
      run:
        shell: bash
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/ci-install-unzip
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ runner.temp }}/bun-install-cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
        env:
          BUN_INSTALL_CACHE_DIR: ${{ runner.temp }}/bun-install-cache
      - name: build spec/core dist (benchmarks import the packages)
        run: bun run check
      - name: bench (writes bench-results.json, customSmallerIsBetter format)
        run: bun run bench:json
      - name: enforce absolute budgets (benchmarks/budgets.json)
        run: bun run bench:budgets
      - name: enforce retained-memory baseline
        run: bun run bench:memory:check
      - name: build packaged interaction performance target
        run: bun run build && DOCS_BUILD_MODE=cloudflare-preview bun run build:docs
      - name: enforce Playwright interaction p50/p95 budgets
        run: bun run test:interaction-perf
      - name: upload results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-results
          path: bench-results.json
          if-no-files-found: error
          retention-days: 14
