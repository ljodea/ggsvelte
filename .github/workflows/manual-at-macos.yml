name: Manual AT — macOS VoiceOver

on:
  workflow_dispatch:
    inputs:
      browser:
        description: Browser pairing to exercise
        required: true
        type: choice
        default: both
        options:
          - both
          - safari
          - chrome
      profile:
        description: macOS/browser accessibility profile
        required: true
        type: choice
        default: baseline
        options:
          - baseline
          - reduced-motion
          - high-contrast
          - browser-zoom-200
          - large-pointer

permissions: {}

concurrency:
  group: manual-at-macos-${{ github.ref }}-${{ inputs.profile }}
  cancel-in-progress: false

jobs:
  voiceover:
    name: VoiceOver + ${{ matrix.browser }} (${{ inputs.profile }})
    strategy:
      fail-fast: false
      matrix:
        browser: ${{ inputs.browser == 'both' && fromJSON('["safari","chrome"]') || fromJSON(format('["{0}"]', inputs.browser)) }}
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run build:docs
      - name: serve the exact built docs artifact
        run: |
          bun scripts/serve-docs.ts > /tmp/ggsvelte-docs.log 2>&1 &
          echo $! > /tmp/ggsvelte-docs.pid
      - name: exercise public keyboard flows with real VoiceOver
        env:
          BROWSER: ${{ matrix.browser }}
          OUTPUT_ROOT: artifacts/manual-at/macos
          PROFILE: ${{ inputs.profile }}
        run: scripts/manual-at/macos/run.sh "$BROWSER" "$PROFILE"
      - name: upload exact speech, caption-panel screenshots, and metadata
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: manual-at-voiceover-${{ matrix.browser }}-${{ inputs.profile }}
          path: |
            artifacts/manual-at/macos/
            /tmp/ggsvelte-docs.log
          if-no-files-found: error
          retention-days: 30
