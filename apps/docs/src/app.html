<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      // Blocking theme/VR bootstrap — runs BEFORE first paint (plan:
      // "?vr&theme=dark sets <html data-theme> pre-paint; single theme
      // mechanism"). `?vr` also stamps data-vr, which the stylesheet uses to
      // strip chrome and freeze transitions/animations. On the public site
      // (no ?vr), prefers-color-scheme maps to data-theme at startup.
      (function () {
        var params = new URLSearchParams(location.search);
        var vr = params.has("vr");
        var theme = params.get("theme");
        var root = document.documentElement;
        if (vr) root.setAttribute("data-vr", "");
        if (theme !== "dark" && theme !== "light") {
          theme =
            !vr &&
            typeof window.matchMedia === "function" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        }
        root.setAttribute("data-theme", theme);
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
