# ggsvelte hooks (python pre-commit framework — plan M0b).
#
# pre-commit stage only: sub-second — format staged files, lint staged files,
# path guards. Heavy work (build, type-aware lint, svelte-check, knip, package
# tests, actionlint/zizmor) lives in CI — never on the git push hook.
#
# All hooks are repo-local and invoke lockfile-installed binaries through
# `bun` / `bun run` (never network bunx). `bun` must be on PATH
# (see CONTRIBUTING.md, including the arm64/x64 note).
default_install_hook_types: [pre-commit]
default_stages: [pre-commit]

repos:
  - repo: local
    hooks:
      - id: oxfmt
        name: oxfmt (staged)
        entry: bun node_modules/.bin/oxfmt
        language: system
        files: \.(ts|tsx|mts|cts|js|jsx|mjs|cjs|json|jsonc|css|toml)$
        # lifecycle.json is generated (gen-lifecycle) and listed in oxfmt
        # ignorePatterns; pass_filenames would make oxfmt exit 2 when it is the
        # only staged json match.
        exclude: ^(spikes/|bun\.lock$|packages/spec/schema/|lifecycle\.json$)

      - id: prettier-svelte-md
        name: prettier (staged .svelte/.md/.yaml)
        entry: bun node_modules/.bin/prettier --write --log-level warn
        language: system
        files: \.(svelte|md|yml|yaml)$
        exclude: ^spikes/

      - id: markdownlint-cli2
        name: markdownlint-cli2 (staged .md)
        entry: bun node_modules/.bin/markdownlint-cli2
        language: system
        files: \.md$
        exclude: ^spikes/
        # Config: .markdownlint-cli2.jsonc (MD013/MD029 relaxed for prose + decision notes)

      - id: oxlint
        name: oxlint (staged)
        entry: bun node_modules/.bin/oxlint
        language: system
        files: \.(ts|tsx|mts|cts|js|jsx|mjs|cjs)$
        exclude: ^spikes/
        # .oxlintrc.json also bans Math.random/Date.now inside examples/**
        # (VR determinism), so staged examples files are guarded here too.

      - id: manifest-current
        name: examples/manifest.ts is current (gen-manifest --check)
        entry: bun run manifest:check
        language: system
        pass_filenames: false
        files: ^examples/
        # The manifest is GENERATED from the corpus; regenerate with
        # `bun run manifest:gen` when adding/renaming examples or metas.

      - id: block-output-paths
        name: block test/visual output dirs
        entry: scripts/guards/block-output-paths.sh
        language: system
        files: (^|/)(test-results|playwright-report|\.vitest-attachments|__screenshots__|coverage)(/|$)
        # VR baselines (tests/visual/__screenshots__) land only via the
        # audited vr-update/pr-N branch. The hook checks the staged diff so
        # clean committed baselines do not break `pre-commit run --all-files`.
